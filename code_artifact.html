            if (seg.car === "scooter") {
                drawRasterAtGround(ctx, rasterAssets.scooterFront, x, groundY + 2, 64);
                return;
            }
            if (seg.car === "motorcycle") {
                drawRasterAtGround(ctx, rasterAssets.motorcycleFront, x, groundY + 2, 64);
                return;
            }

            if (!elevationFacesFront) {
                if (isClassic) {
                    drawClassicCarRear(ctx, x, groundY, 1.25 * carScale, bodyColor);
                } else {
                    drawModernCarRear(ctx, x, groundY, 1.25 * carScale, bodyColor);
                }
            } else if (isClassic) {
                drawClassicCarFront(ctx, x, groundY, 1.25 * carScale, bodyColor);
            } else {
                drawModernCarFront(ctx, x, groundY, 1.25 * carScale, bodyColor);
            }
        }

        // --- MASTER SYSTEM DRAWING FUNCTION (Enables Retina-Sharp Display & Pristine 2K Export!) ---
        function drawEverything(targetCtx, targetWidth, targetHeight, options = {}) {
            targetCtx.save();
            const showEditorGuides = options.showEditorGuides === true;

            // Clear target canvas background
            targetCtx.fillStyle = "#ffffff";
            targetCtx.fillRect(0, 0, targetWidth, targetHeight);

            // Compute unified scale coefficient to maintain pixel perfect alignments on base dimension (1050x880)
            const scaleFactor = targetWidth / 1050;
            targetCtx.scale(scaleFactor, scaleFactor);

            // The following code coordinates are calibrated to a 1050 x 880 master space:
            let totalMeters = segments.reduce((sum, s) => sum + s.width, 0);
            const buildingWidthM = 2.5; // Fixed side building profile buffers
            const totalRenderWidthM = totalMeters + (buildingWidthM * 2);

            // Compute scaling (Pixels per Meter)
            const activeWidth = 1050 - 100; // Left & Right outer padding
            const pxPerMeter = activeWidth / totalRenderWidthM;

            const startX = 50 + (buildingWidthM * pxPerMeter); // Start of active street structure

            // Define vertical layout bands
            const topViewY = 100;
            const topViewHeight = 150;
            const labelSectionY = 270;
            const labelSectionHeight = 50;
            const elevationY = 920; // Five true-scale 4 m floors retain a clear gap below the plan view.

            // --- RENDER LEFT & RIGHT ARCADE BUILDINGS ---
            const buildingWidthPx = buildingWidthM * pxPerMeter;
            const rightBuildingStartX = startX + (totalMeters * pxPerMeter);
            const leftFloors = parseInt(leftBuildingFloors.value, 10) || 3;
            const rightFloors = parseInt(rightBuildingFloors.value, 10) || 4;

            if (toggleTopView.checked) {
                drawArcadePlan(targetCtx, 50, buildingWidthPx, topViewY, topViewHeight, "left");
                drawArcadePlan(targetCtx, rightBuildingStartX, buildingWidthPx, topViewY, topViewHeight, "right");
            }

            drawArcadeBuilding(
                targetCtx,
                50,
                buildingWidthPx,
                elevationY,
                leftFloors,
                "left",
                toggleDecorations.checked ? leftArcadePeople.value : "none",
                leftArcadeSign.value
            );
            drawArcadeBuilding(
                targetCtx,
                rightBuildingStartX,
                buildingWidthPx,
                elevationY,
                rightFloors,
                "right",
                toggleDecorations.checked ? rightArcadePeople.value : "none",
                rightArcadeSign.value
            );

            // --- DYNAMIC RENDER SEGMENTS ---
            let currentX = startX;

            segments.forEach((seg, index) => {
                const segWidthPx = seg.width * pxPerMeter;
                const midX = currentX + (segWidthPx / 2);

                // --- PLAN / TOP-DOWN VIEW ---
                if (toggleTopView.checked) {
                    if (seg.type === 'sidewalk') {
                        // Light beige sidewalk tiles
                        targetCtx.fillStyle = "#f3f4f6";
                        targetCtx.fillRect(currentX, topViewY, segWidthPx, topViewHeight);
                        
                        // Vertical tile seam lines
                        targetCtx.strokeStyle = "rgba(255, 255, 255, 0.9)";
                        targetCtx.lineWidth = 1;
                        for (let tx = currentX; tx < currentX + segWidthPx; tx += 12) {
                            targetCtx.beginPath();
                            targetCtx.moveTo(tx, topViewY);
                            targetCtx.lineTo(tx, topViewY + topViewHeight);
                            targetCtx.stroke();
                        }

                    } else if (seg.type === 'facility') {
                        // Soft grey facility band
                        targetCtx.fillStyle = "#e5e7eb";
                        targetCtx.fillRect(currentX, topViewY, segWidthPx, topViewHeight);

                        // Parked scooter diagonal bays — mirror left/right so noses face the outer edge
                        if (toggleDecorations.checked && (seg.extra === 'scooter_parking' || seg.car === 'scooter_group')) {
                            const roadCenterX = startX + (totalMeters * pxPerMeter) / 2;
                            const parkingSide = midX < roadCenterX ? 'left' : 'right';
                            drawScooterParkingTop(targetCtx, midX, topViewY + topViewHeight/2, segWidthPx, topViewHeight, parkingSide);
                        } else if (toggleDecorations.checked && seg.car !== 'none') {
                            drawTopViewVehicle(targetCtx, midX, topViewY + topViewHeight / 2, segWidthPx, 75, seg.car, "toward");
                        }

                        // Small tree planter box
                        const treeStyle = seg.treeStyle || (seg.tree ? "fat" : "none");
                        if (toggleDecorations.checked && treeStyle !== "none") {
                            targetCtx.fillStyle = "rgba(120, 180, 125, 0.4)";
                            targetCtx.beginPath();
                            if (treeStyle === "hedge") {
                                // Continuous clipped hedge strip running along the road
                                targetCtx.roundRect(midX - 8, topViewY + 6, 16, topViewHeight - 12, 7);
                            } else if (treeStyle === "slim") {
                                targetCtx.ellipse(midX, topViewY + topViewHeight - 30, 11, 22, 0, 0, Math.PI * 2);
                            } else {
                                targetCtx.arc(midX, topViewY + topViewHeight - 30, 20, 0, Math.PI * 2);
                            }
                            targetCtx.fill();
                            targetCtx.strokeStyle = "#16a34a";
                            targetCtx.lineWidth = 1;
                            targetCtx.stroke();
                        }

                    } else if (seg.type === 'median') {
                        targetCtx.fillStyle = "#dce8d7";
                        targetCtx.fillRect(currentX, topViewY, segWidthPx, topViewHeight);

                        targetCtx.strokeStyle = "#7c8f74";
                        targetCtx.lineWidth = 2;
                        targetCtx.strokeRect(currentX, topViewY, segWidthPx, topViewHeight);

                        targetCtx.fillStyle = "rgba(120, 160, 104, 0.22)";
                        targetCtx.fillRect(currentX + 4, topViewY + 4, Math.max(0, segWidthPx - 8), topViewHeight - 8);

                        const medianTreeStyle = seg.treeStyle || "none";
                        if (toggleDecorations.checked && medianTreeStyle !== "none") {
                            targetCtx.fillStyle = "rgba(79, 140, 77, 0.48)";
                            targetCtx.beginPath();
                            if (medianTreeStyle === "slim") {
                                targetCtx.ellipse(midX, topViewY + topViewHeight / 2, 10, 24, 0, 0, Math.PI * 2);
                            } else {
                                targetCtx.arc(midX, topViewY + topViewHeight / 2, 20, 0, Math.PI * 2);
                            }
                            targetCtx.fill();
                            targetCtx.strokeStyle = "#3f7d44";
                            targetCtx.lineWidth = 1.2;
                            targetCtx.stroke();
                        }

                    } else if (seg.type === 'bike') {
                        // Painted green cycleway surface
                        targetCtx.fillStyle = "#6f9e7d";
                        targetCtx.fillRect(currentX, topViewY, segWidthPx, topViewHeight);

                        // White solid edge lines
                        targetCtx.strokeStyle = "#ffffff";
                        targetCtx.lineWidth = 1.8;
                        targetCtx.beginPath();
                        targetCtx.moveTo(currentX + 1.5, topViewY);
                        targetCtx.lineTo(currentX + 1.5, topViewY + topViewHeight);
                        targetCtx.moveTo(currentX + segWidthPx - 1.5, topViewY);
                        targetCtx.lineTo(currentX + segWidthPx - 1.5, topViewY + topViewHeight);
                        targetCtx.stroke();

                        // Standard pavement bicycle marking
                        if (toggleDecorations.checked) {
                            drawBikeMarkingTop(targetCtx, midX, topViewY + topViewHeight / 2);
                        }

                    } else if (seg.type === 'lane') {
                        // Dark asphalt background
                        targetCtx.fillStyle = "#4b5563";
                        targetCtx.fillRect(currentX, topViewY, segWidthPx, topViewHeight);

                        // Lanes separator logic
                        targetCtx.strokeStyle = "#ffffff";
                        targetCtx.lineWidth = 1.8;
                        const nextSeg = segments[index + 1];

                        if (nextSeg && nextSeg.type === 'lane') {
                            // Center dashed separator line
                            targetCtx.save();
                            targetCtx.setLineDash([16, 16]);
                            targetCtx.beginPath();
                            targetCtx.moveTo(currentX + segWidthPx, topViewY);
                            targetCtx.lineTo(currentX + segWidthPx, topViewY + topViewHeight);
                            targetCtx.stroke();
                            targetCtx.restore();
                        } else {
                            // Thick solid white outer boundary
                            targetCtx.beginPath();
                            targetCtx.moveTo(currentX + segWidthPx, topViewY);
                            targetCtx.lineTo(currentX + segWidthPx, topViewY + topViewHeight);
                            targetCtx.stroke();
                        }

                        if (toggleDecorations.checked && seg.car !== 'none') {
                            drawTopViewVehicle(
                                targetCtx,
                                midX,
                                topViewY + topViewHeight / 2,
                                segWidthPx,
                                85,
                                seg.car,
                                getCarDirection(seg)
                            );
                        }
                    }

                    if (toggleDecorations.checked && seg.streetAsset && seg.streetAsset !== 'none') {
                        drawStreetAssetTop(
                            targetCtx,
                            midX,
                            topViewY + 20,
                            1,
                            seg.streetAsset,
                            seg.type === 'median' && seg.streetAsset === 'streetlight'
                        );
                    }
                }

                // --- PARAMETER DIMENSION GUIDES & BANNERS (MIDDLE) ---
                if (toggleDimensions.checked) {
                    // Vertical guideline dashes linking top/elevation views
                    targetCtx.strokeStyle = "rgba(148, 163, 184, 0.4)";
                    targetCtx.lineWidth = 0.9;
                    targetCtx.setLineDash([5, 5]);
                    
                    targetCtx.beginPath();
                    targetCtx.moveTo(currentX, topViewY + topViewHeight);
                    targetCtx.lineTo(currentX, elevationY);
                    targetCtx.stroke();

                    // Final right border dashed line
                    if (index === segments.length - 1) {
                        targetCtx.beginPath();
                        targetCtx.moveTo(currentX + segWidthPx, topViewY + topViewHeight);
                        targetCtx.lineTo(currentX + segWidthPx, elevationY);
                        targetCtx.stroke();
                    }
                    targetCtx.setLineDash([]); // Reset line dashes

                    // Background color styling for the dimension tags
                    let tagBg = "#e2e8f0";
                    let tagText = "#334155";

                    if (seg.type === 'sidewalk') {
                        tagBg = "#fef3c7"; // Warm Yellow
                        tagText = "#92400e";
                    } else if (seg.type === 'facility') {
                        tagBg = "#e0f2fe"; // Soft Blue
                        tagText = "#0369a1";
                    } else if (seg.type === 'median') {
                        tagBg = "#dcfce7";
                        tagText = "#166534";
                    } else if (seg.type === 'bike') {
                        tagBg = "#ecfccb";
                        tagText = "#3f6212";
                    }

                    // Dimension banner
                    targetCtx.fillStyle = tagBg;
                    targetCtx.fillRect(currentX + 1.5, labelSectionY, segWidthPx - 3, labelSectionHeight);
                    
                    targetCtx.strokeStyle = "rgba(100, 116, 139, 0.2)";
                    targetCtx.lineWidth = 1;
                    targetCtx.strokeRect(currentX + 1.5, labelSectionY, segWidthPx - 3, labelSectionHeight);

                    // Printed Dimension Value Text
                    targetCtx.fillStyle = tagText;
                    targetCtx.font = "bold 15px 'Inter'";
                    targetCtx.textAlign = "center";
                    targetCtx.textBaseline = "middle";
                    targetCtx.fillText(seg.width.toString(), midX, labelSectionY + labelSectionHeight/2);
                }

                // --- ELEVATION VIEW (CROSS-SECTIONAL MODELS) ---
                // Ground Level Line
                targetCtx.strokeStyle = "#1e293b";
                targetCtx.lineWidth = 4;
                targetCtx.beginPath();
                targetCtx.moveTo(startX, elevationY);
                targetCtx.lineTo(startX + (totalMeters * pxPerMeter), elevationY);
                targetCtx.stroke();

                // Urban Curbs elevation detailing (raise sidewalk and facilities by 5px)
                const curbShift = 4.5;
                const medianShift = 9;
                if (seg.type === 'sidewalk' || seg.type === 'facility' || seg.type === 'median') {
                    const surfaceShift = seg.type === 'median' ? medianShift : curbShift;
                    targetCtx.fillStyle = seg.type === 'median' ? "#c7d7bd" : "#cbd5e1";
                    targetCtx.fillRect(currentX, elevationY - surfaceShift, segWidthPx, surfaceShift);
                    targetCtx.strokeStyle = "#475569";
                    targetCtx.lineWidth = 1;
                    targetCtx.strokeRect(currentX, elevationY - surfaceShift, segWidthPx, surfaceShift);
                }

                // Painted cycleway surface strip at road level
                if (seg.type === 'bike') {
                    targetCtx.fillStyle = "#86b794";
                    targetCtx.fillRect(currentX, elevationY - 3, segWidthPx, 3);
                    targetCtx.strokeStyle = "#476b53";
                    targetCtx.lineWidth = 1;
                    targetCtx.strokeRect(currentX, elevationY - 3, segWidthPx, 3);
                }

                // Continue the raised sidewalk section line into the arcade floor.
                if (seg.type === 'sidewalk' && index === 0) {
                    targetCtx.fillStyle = "#ffffff";
                    targetCtx.fillRect(50, elevationY - curbShift, startX - 50, curbShift);
                    targetCtx.strokeStyle = "#1e293b";
                    targetCtx.lineWidth = 3;
                    targetCtx.beginPath();
                    targetCtx.moveTo(50, elevationY - curbShift);
                    targetCtx.lineTo(currentX + segWidthPx, elevationY - curbShift);
                    targetCtx.stroke();
                }
                if (seg.type === 'sidewalk' && index === segments.length - 1) {
                    const buildingOuterX = rightBuildingStartX + buildingWidthPx;
                    targetCtx.fillStyle = "#ffffff";
                    targetCtx.fillRect(rightBuildingStartX, elevationY - curbShift, buildingWidthPx, curbShift);
                    targetCtx.strokeStyle = "#1e293b";
                    targetCtx.lineWidth = 3;
                    targetCtx.beginPath();
                    targetCtx.moveTo(currentX, elevationY - curbShift);
                    targetCtx.lineTo(buildingOuterX, elevationY - curbShift);
                    targetCtx.stroke();
                }

                // Render dynamic elevation models
                if (seg.type === 'sidewalk') {
                    if (toggleDecorations.checked && seg.ped !== 'none') {
                        drawArtsyPedestrian(targetCtx, midX, elevationY - curbShift, 1, seg.ped);
                    }
                } else if (seg.type === 'facility') {
                    // Place utility cabinet
                    if (toggleDecorations.checked && seg.extra === 'box') {
                        drawUtilityBox(targetCtx, currentX + 12, elevationY - curbShift, 1.1);
                    }

                    // Place selected hand-drawn tree profile.
                    const treeStyle = seg.treeStyle || (seg.tree ? "fat" : "none");
                    if (treeStyle !== "none") {
                        drawArtsyTree(targetCtx, midX, elevationY - curbShift, 1.35, treeStyle);
                    }

                    // Parked vehicles sit at ROAD level (elevationY) so they read at the same
                    // height as the lane vehicles; the trees / utility box / pedestrians above
                    // stay on the raised curb band. Two-wheelers use their flat side profile and
                    // are seated so the wheels touch the ground (no more floating sprites).
                    if (toggleDecorations.checked && seg.car !== 'none') {
                        const parkGroundY = elevationY;            // road level, matches lane cars
                        const parkMaxWidth = segWidthPx * 1.3;     // allow a little curbside overhang
                        if (seg.car === 'scooter' || seg.car === 'scooter_group') {
                            drawParkedSprite(targetCtx, rasterAssets.scooterSide, midX, parkGroundY, 42, parkMaxWidth);
                        } else if (seg.car === 'motorcycle') {
                            drawParkedSprite(targetCtx, rasterAssets.motorcycleSide, midX, parkGroundY, 42, parkMaxWidth);
                        } else {
                            // Render the parked car exactly like the matching lane car (same size + ground line).
                            drawLaneVehicle(targetCtx, seg, midX, parkGroundY);
                        }
                    }
                } else if (seg.type === 'median') {
                    const medianTreeStyle = seg.treeStyle || "none";
                    if (medianTreeStyle !== "none") {
                        drawArtsyTree(targetCtx, midX, elevationY - medianShift, 1.25, medianTreeStyle);
                    }
                } else if (seg.type === 'bike') {
                    if (toggleDecorations.checked && seg.car === 'bike') {
                        drawCyclistFront(targetCtx, midX, elevationY - 3, 1.05);
                    }
                } else if (seg.type === 'lane') {
                    if (toggleDecorations.checked && seg.car !== 'none') {
                        drawLaneVehicle(targetCtx, seg, midX, elevationY);
                    }
                }

                if (toggleDecorations.checked && seg.streetAsset && seg.streetAsset !== 'none') {
                    const assetGroundY = elevationY - (seg.type === 'lane' ? 0 : seg.type === 'median' ? medianShift : curbShift);
                    drawStreetAsset(
                        targetCtx,
                        midX,
                        assetGroundY,
                        1,
                        seg.streetAsset,
                        seg.type === 'median' && seg.streetAsset === 'streetlight'
                    );
                }

                // --- VERTICAL TEXT CHINESE LABELS (BOTTOM) ---
                const textColY = elevationY + 45;

                // Color-matched columnar tint backgrounds
                let columnTint = "rgba(241, 245, 249, 0.12)";
                if (seg.type === 'sidewalk') columnTint = "rgba(251, 191, 36, 0.08)";
                else if (seg.type === 'facility') columnTint = "rgba(56, 189, 248, 0.08)";
                else if (seg.type === 'median') columnTint = "rgba(34, 197, 94, 0.08)";
                else if (seg.type === 'bike') columnTint = "rgba(132, 204, 22, 0.10)";

                targetCtx.fillStyle = columnTint;
                targetCtx.fillRect(currentX, elevationY, segWidthPx, 185);

                // Write Vertical road segment names (Supports multi-line via '\n')
                targetCtx.save();
                targetCtx.translate(midX, textColY);
                targetCtx.fillStyle = "#334155";
                targetCtx.font = "bold 14px 'Noto Sans TC'";
                targetCtx.textAlign = "center";
                
                const labelLines = seg.name.split('\n');
                labelLines.forEach((line, lineIdx) => {
                    targetCtx.fillText(line, 0, lineIdx * 19);
                });
                targetCtx.restore();

                // Keep only the parking marker; pedestrian and median decorations are drawn in the elevation band above.
                if (seg.type === 'facility' && seg.extra === 'scooter_parking') {
                    const markerY = elevationY + 150;
                    targetCtx.fillStyle = "#e0f2fe";
                    targetCtx.strokeStyle = "#7dd3fc";
                    targetCtx.lineWidth = 1;
                    targetCtx.beginPath();
                    targetCtx.roundRect(midX - 26, markerY - 10, 52, 20, 4);
                    targetCtx.fill();
                    targetCtx.stroke();
                    targetCtx.fillStyle = "#0369a1";
                    targetCtx.font = "bold 11px 'Noto Sans TC'";
                    targetCtx.textAlign = "center";
                    targetCtx.textBaseline = "middle";
                    targetCtx.fillText("機車停車", midX, markerY);
                }

                // --- EDITOR-ONLY PREVIEW GUIDES (numbering badges + hover highlight; never exported) ---
                if (showEditorGuides) {
                    // Hover highlight synced with the sidebar card under the cursor
                    if (activeSegmentIndex === index) {
                        targetCtx.fillStyle = "rgba(16, 185, 129, 0.08)";
                        targetCtx.fillRect(currentX, topViewY, segWidthPx, (elevationY + 185) - topViewY);
                        targetCtx.strokeStyle = "rgba(16, 185, 129, 0.75)";
                        targetCtx.lineWidth = 2;
                        targetCtx.strokeRect(currentX + 1, topViewY + 1, segWidthPx - 2, (elevationY + 185) - topViewY - 2);
                    }

                    // Segment index badge (matches the card numbers in the sidebar)
                    const badgeY = labelSectionY - 16;
                    targetCtx.fillStyle = "#0f172a";
                    targetCtx.beginPath();
                    targetCtx.arc(midX, badgeY, 11, 0, Math.PI * 2);
                    targetCtx.fill();
                    targetCtx.fillStyle = "#ffffff";
                    targetCtx.font = "bold 12px 'Inter'";
                    targetCtx.textAlign = "center";
                    targetCtx.textBaseline = "middle";
                    targetCtx.fillText(String(index + 1), midX, badgeY + 0.5);
                }

                // Advance the cursor to the next segment
                currentX += segWidthPx;
            });

            // --- DRAG-TO-REORDER DROP INDICATOR (editor only, never exported) ---
            if (showEditorGuides && canvasDrag.active && canvasDrag.moved && canvasDrag.fromIndex !== null) {
                const insAt = insertionIndexAtMasterX(canvasDrag.pointerX);
                let bx = startX;
                for (let k = 0; k < insAt && k < segments.length; k++) bx += segments[k].width * pxPerMeter;
                let dx = startX;
                for (let k = 0; k < canvasDrag.fromIndex && k < segments.length; k++) dx += segments[k].width * pxPerMeter;
                const dW = (segments[canvasDrag.fromIndex] ? segments[canvasDrag.fromIndex].width : 0) * pxPerMeter;
                const topY = topViewY - 24;
                const botY = elevationY + 60;
                targetCtx.save();
                // Highlight the column being dragged
                targetCtx.fillStyle = "rgba(16,185,129,0.12)";
                targetCtx.fillRect(dx, topY, dW, botY - topY);
                // Insertion line with arrow caps
                targetCtx.strokeStyle = "#10b981";
                targetCtx.lineWidth = 4;
                targetCtx.beginPath();
                targetCtx.moveTo(bx, topY);
                targetCtx.lineTo(bx, botY);
                targetCtx.stroke();
                targetCtx.fillStyle = "#10b981";
                targetCtx.beginPath();
                targetCtx.moveTo(bx - 7, topY); targetCtx.lineTo(bx + 7, topY); targetCtx.lineTo(bx, topY + 10); targetCtx.closePath(); targetCtx.fill();
                targetCtx.beginPath();
                targetCtx.moveTo(bx - 7, botY); targetCtx.lineTo(bx + 7, botY); targetCtx.lineTo(bx, botY - 10); targetCtx.closePath(); targetCtx.fill();
                targetCtx.restore();
            }

            // --- TOTAL ROAD WIDTH DIMENSION BRACKETS (TOP BAND + BELOW THE CROSS-SECTION) ---
            const totalBracketY = 42;
            const bracketEndX = startX + (totalMeters * pxPerMeter);
            const totalLabel = `路幅總寬度 ${totalMeters.toFixed(2)} M`;

            const drawTotalWidthBracket = (y) => {
                targetCtx.strokeStyle = "#0f172a";
                targetCtx.lineWidth = 2;
                targetCtx.beginPath();
                targetCtx.moveTo(startX, y);
                targetCtx.lineTo(bracketEndX, y);
                targetCtx.stroke();

                // End ticks
                targetCtx.beginPath();
                targetCtx.moveTo(startX, y - 8);
                targetCtx.lineTo(startX, y + 8);
                targetCtx.moveTo(bracketEndX, y - 8);
                targetCtx.lineTo(bracketEndX, y + 8);
                targetCtx.stroke();

                // Centered label pill on the bracket line
                const labelX = startX + (totalMeters * pxPerMeter) / 2;
                targetCtx.font = "bold 17px 'Noto Sans TC'";
                const totalLabelW = targetCtx.measureText(totalLabel).width + 28;
                targetCtx.fillStyle = "#ffffff";
                targetCtx.strokeStyle = "#0f172a";
                targetCtx.lineWidth = 1.5;
                targetCtx.beginPath();
                targetCtx.roundRect(labelX - totalLabelW / 2, y - 14, totalLabelW, 28, 14);
                targetCtx.fill();
                targetCtx.stroke();
                targetCtx.fillStyle = "#0f172a";
                targetCtx.textAlign = "center";
                targetCtx.textBaseline = "middle";
                targetCtx.fillText(totalLabel, labelX, y + 1);
            };

            drawTotalWidthBracket(totalBracketY);              // Above the plan view
            drawTotalWidthBracket(elevationY + 215);           // Below the cross-section name labels

            // --- ROAD NAME TITLE (centered, directly above the total-width label) ---
            if (roadName && roadName.trim()) {
                const rnText = roadName.trim();
                const rnCenterX = startX + (totalMeters * pxPerMeter) / 2;  // same center as the 路幅總寬度 label
                const rnPadX = 13;
                const drawRoadName = (bracketY) => {
                    const rnY = bracketY - 28;          // sit just above the 路幅總寬度 label pill
                    targetCtx.font = "bold 16px 'Noto Sans TC'";
                    targetCtx.textAlign = "center";
                    targetCtx.textBaseline = "middle";
                    const rnPillW = targetCtx.measureText(rnText).width + rnPadX * 2;
                    const rnPillH = 24;
                    targetCtx.fillStyle = "#0f172a";
                    targetCtx.beginPath();
                    targetCtx.roundRect(rnCenterX - rnPillW / 2, rnY - rnPillH / 2, rnPillW, rnPillH, 8);
                    targetCtx.fill();
                    targetCtx.fillStyle = "#ffffff";
                    targetCtx.fillText(rnText, rnCenterX, rnY + 1);
                };
                drawRoadName(totalBracketY);            // Above the top 路幅總寬度 label
                drawRoadName(elevationY + 215);         // Above the bottom 路幅總寬度 label
            }

            // --- LEFT / RIGHT PEDESTRIAN-REALM SUB-BRACKETS ---
            // Groups of consecutive non-lane segments at each edge (sidewalk + facility belts)
            let leftGroupM = 0;
            for (const s of segments) {
                if (s.type === 'lane') break;
                leftGroupM += s.width;
            }
            let rightGroupM = 0;
            for (let i = segments.length - 1; i >= 0; i--) {
                if (segments[i].type === 'lane') break;
                rightGroupM += segments[i].width;
            }

            if (leftGroupM > 0 || rightGroupM > 0) {
                const drawSubBrackets = (subBracketY) => {
                    targetCtx.strokeStyle = "#64748b";
                    targetCtx.lineWidth = 1.5;
                    targetCtx.font = "bold 12px 'Noto Sans TC'";

                    if (leftGroupM > 0) {
                        const leftGroupPx = leftGroupM * pxPerMeter;
                        targetCtx.strokeStyle = "#64748b";
                        targetCtx.lineWidth = 1.5;
                        targetCtx.beginPath();
                        targetCtx.moveTo(startX, subBracketY);
                        targetCtx.lineTo(startX + leftGroupPx, subBracketY);
                        targetCtx.stroke();

                        targetCtx.beginPath();
                        targetCtx.moveTo(startX, subBracketY - 6);
                        targetCtx.lineTo(startX, subBracketY + 6);
                        targetCtx.moveTo(startX + leftGroupPx, subBracketY - 6);
                        targetCtx.lineTo(startX + leftGroupPx, subBracketY + 6);
                        targetCtx.stroke();

                        const leftMidX = startX + (leftGroupPx / 2);
                        const leftStr = `${leftGroupM.toFixed(2)}M`;
                        const leftW = targetCtx.measureText(leftStr).width + 16;
                        targetCtx.fillStyle = "#ffffff";
                        targetCtx.fillRect(leftMidX - leftW / 2, subBracketY - 9, leftW, 18);
                        targetCtx.fillStyle = "#475569";
                        targetCtx.textAlign = "center";
                        targetCtx.textBaseline = "middle";
                        targetCtx.fillText(leftStr, leftMidX, subBracketY);
                    }

                    if (rightGroupM > 0) {
                        const rightGroupPx = rightGroupM * pxPerMeter;
                        const rightStartX = bracketEndX - rightGroupPx;
                        targetCtx.strokeStyle = "#64748b";
                        targetCtx.lineWidth = 1.5;
                        targetCtx.beginPath();
                        targetCtx.moveTo(rightStartX, subBracketY);
                        targetCtx.lineTo(bracketEndX, subBracketY);
                        targetCtx.stroke();

                        targetCtx.beginPath();
                        targetCtx.moveTo(rightStartX, subBracketY - 6);
                        targetCtx.lineTo(rightStartX, subBracketY + 6);
                        targetCtx.moveTo(bracketEndX, subBracketY - 6);
                        targetCtx.lineTo(bracketEndX, subBracketY + 6);
                        targetCtx.stroke();

                        const rightMidX = rightStartX + (rightGroupPx / 2);
                        const rightStr = `${rightGroupM.toFixed(2)}M`;
                        const rightW = targetCtx.measureText(rightStr).width + 16;
                        targetCtx.fillStyle = "#ffffff";
                        targetCtx.fillRect(rightMidX - rightW / 2, subBracketY - 9, rightW, 18);
                        targetCtx.fillStyle = "#475569";
                        targetCtx.textAlign = "center";
                        targetCtx.textBaseline = "middle";
                        targetCtx.fillText(rightStr, rightMidX, subBracketY);
                    }
                };

                drawSubBrackets(totalBracketY + 38);     // Below the top total bracket
                drawSubBrackets(elevationY + 215 + 38);  // Below the bottom total bracket (under the section)
            }

            targetCtx.restore();
        }

        // --- SCREEN DISPLAY RENDER ADAPTER ---
        function render() {
            try {
                // High DPI Retina Support for Onscreen canvas
                const dpr = window.devicePixelRatio || 1;
                const canvasContainer = document.getElementById('canvas-container');

                const baseWidth = 1050;
                const baseHeight = 1190; // Extra band for the bottom total-width bracket
                const aspectRatio = baseWidth / baseHeight;

                // Fit inside both available width and height while preserving 1050:880.
                const containerStyle = window.getComputedStyle(canvasContainer);
                const horizontalPadding = parseFloat(containerStyle.paddingLeft) + parseFloat(containerStyle.paddingRight);
                const verticalPadding = parseFloat(containerStyle.paddingTop) + parseFloat(containerStyle.paddingBottom);
                const availableWidth = Math.max(1, canvasContainer.clientWidth - horizontalPadding);
                const availableHeight = Math.max(1, canvasContainer.clientHeight - verticalPadding);

                let displayWidth = availableWidth;
                let displayHeight = displayWidth / aspectRatio;

                if (displayHeight > availableHeight) {
                    displayHeight = availableHeight;
                    displayWidth = displayHeight * aspectRatio;
                }

                roadCanvas.width = baseWidth * dpr;
                roadCanvas.height = baseHeight * dpr;
                roadCanvas.style.width = `${Math.floor(displayWidth)}px`;
                roadCanvas.style.height = `${Math.floor(displayHeight)}px`;
                roadCanvas.style.aspectRatio = `${baseWidth} / ${baseHeight}`;

                ctx.clearRect(0, 0, roadCanvas.width, roadCanvas.height);

                // Draw uniformly to screen canvas using standard scale adapter
                drawEverything(ctx, baseWidth * dpr, baseHeight * dpr, { showEditorGuides: true });

                let totalM = segments.reduce((sum, s) => sum + s.width, 0);
                scaleIndicator.innerText = `繪圖比例尺: 1M ＝ ${( (baseWidth - 100) / (totalM + 5) ).toFixed(1)}px`;
            } catch (err) {
                console.error("Onscreen rendering failed:", err);
            }
        }

        // --- CLEAN DIRECT 2K HIGH-RESOLUTION EXPORT ENGINE ---
        function exportImage() {
            const buildExportCanvas = () => {
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = 2560; // Standard master 2K Width
                exportCanvas.height = Math.round(2560 * (1190 / 1050));
                const exportCtx = exportCanvas.getContext('2d');
                drawEverything(exportCtx, exportCanvas.width, exportCanvas.height, { showEditorGuides: false });
                return exportCanvas;
            };

            const downloadBlob = (blob, fileName) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.download = fileName;
                a.href = url;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 5000);
            };

            const totalM = segments.reduce((acc, curr) => acc + curr.width, 0).toFixed(1);
            const fileName = `道路剖面2K設計圖_${segments.length}區段_${totalM}M.png`;

            // Last-resort path: the canvas was tainted by external images —
            // rebuild on a fresh canvas with vector-only sprites (never taints).
            const exportVectorFallback = () => {
                try {
                    suppressRasters = true;
                    const cleanCanvas = buildExportCanvas();
                    suppressRasters = false;
                    cleanCanvas.toBlob((blob) => {
                        if (!blob) { showToast("匯出失敗，請回報此問題", "error"); return; }
                        downloadBlob(blob, fileName);
                        showToast("受瀏覽器安全限制，人物/車輛已改以向量風格匯出", "info");
                    }, "image/png");
                } catch (e2) {
                    suppressRasters = false;
                    console.error("Vector fallback export failed:", e2);
                    showToast("匯出失敗：" + e2.message, "error");
                }
            };

            try {
                const exportCanvas = buildExportCanvas();
                exportCanvas.toBlob((blob) => {
                    if (!blob) { exportVectorFallback(); return; }
                    downloadBlob(blob, fileName);
                    showToast("🎉 2K 高解析剖面圖已成功儲存！", "success");
                }, "image/png");
            } catch (err) {
                console.error("2K Export failed (likely tainted canvas), retrying vector-only:", err);
                exportVectorFallback();
            }
        }

        // App Launch Bootstrap
        window.onload = function() {
            const restored = loadState();
            applyWidthLockUI();
            renderSidebar();
            render();
            if (restored) showToast('已自動還原上次的配置', 'info', '重設為 20M', () => applyPreset('classic20'));
        }

        // Responsive Resizing Handler
        window.addEventListener('resize', render);

        // --- CANVAS → SIDEBAR REVERSE NAVIGATION ---
        // Clicking a segment on the canvas scrolls to & highlights its settings card.
        // Convert a pointer event into the 1050px master coordinate space used by drawEverything
        function canvasMasterX(e) {
            const rect = roadCanvas.getBoundingClientRect();
            return (e.clientX - rect.left) * (1050 / rect.width);
        }
        function layoutPxPerMeter() {
            const totalM = segments.reduce((sum, s) => sum + s.width, 0);
            return (1050 - 100) / (totalM + 5); // Mirrors drawEverything layout math
        }
        // Which segment sits under a master-X coordinate (or null)
        function segmentIndexAtMasterX(xMaster) {
            const ppm = layoutPxPerMeter();
            let acc = 50 + (2.5 * ppm); // startX after the left building buffer
            for (let i = 0; i < segments.length; i++) {
                const wPx = segments[i].width * ppm;
                if (xMaster >= acc && xMaster < acc + wPx) return i;
                acc += wPx;
            }
            return null;
        }
        // Insertion slot (0..n) for a drop at a master-X coordinate
        function insertionIndexAtMasterX(xMaster) {
            const ppm = layoutPxPerMeter();
            let acc = 50 + (2.5 * ppm);
            for (let i = 0; i < segments.length; i++) {
                const wPx = segments[i].width * ppm;
                if (xMaster < acc + wPx / 2) return i;
                acc += wPx;
            }
            return segments.length;
        }
        // X (master coords) of the boundary before insertion slot `insAt`
        function insertionBoundaryX(insAt) {
            const ppm = layoutPxPerMeter();
            let bx = 50 + (2.5 * ppm);
            for (let k = 0; k < insAt && k < segments.length; k++) bx += segments[k].width * ppm;
            return bx;
        }

        // --- CROSS-SECTION DRAG-TO-REORDER (drag a segment left/right to reposition; a plain click still focuses it) ---
        roadCanvas.addEventListener('mousedown', (e) => {
            const idx = segmentIndexAtMasterX(canvasMasterX(e));
            if (idx === null) return;
            canvasDrag = { active: true, fromIndex: idx, startClientX: e.clientX, pointerX: canvasMasterX(e), moved: false };
            roadCanvas.style.cursor = 'grabbing';
            e.preventDefault();
        });
        window.addEventListener('mousemove', (e) => {
            if (!canvasDrag.active) return;
            canvasDrag.pointerX = canvasMasterX(e);
            if (!canvasDrag.moved && Math.abs(e.clientX - canvasDrag.startClientX) > 4) canvasDrag.moved = true;
            if (canvasDrag.moved) render();
        });
        window.addEventListener('mouseup', (e) => {
            if (!canvasDrag.active) return;
            const drag = canvasDrag;
            canvasDrag = { active: false, fromIndex: null, startClientX: 0, pointerX: 0, moved: false };
            roadCanvas.style.cursor = '';
            if (drag.moved) {
                let insAt = insertionIndexAtMasterX(canvasMasterX(e));
                const [movedSeg] = segments.splice(drag.fromIndex, 1);
                if (drag.fromIndex < insAt) insAt--;
                insAt = Math.max(0, Math.min(segments.length, insAt));
                segments.splice(insAt, 0, movedSeg);
                renderSidebar();
                render();
                saveState();
            } else {
                focusSegmentCard(drag.fromIndex);
            }
        });
        // Hover affordance — grab cursor over a draggable segment
        roadCanvas.addEventListener('mousemove', (e) => {
            if (canvasDrag.active) return;
            roadCanvas.style.cursor = segmentIndexAtMasterX(canvasMasterX(e)) !== null ? 'grab' : '';
        });

        function focusSegmentCard(index) {
            setActiveSegment(index);
            const card = segmentsContainer.children[index];
            if (!card) return;
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.classList.add('ring-2', 'ring-emerald-400', 'ring-offset-1');
            setTimeout(() => card.classList.remove('ring-2', 'ring-emerald-400', 'ring-offset-1'), 1400);
        }
    </script>
</body>
</html>
