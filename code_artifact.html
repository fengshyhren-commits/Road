<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道路剖面動態生成與渲染平台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Noto Sans TC -->

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #f1f5f9;
            font-size: 16px;
        }
        .text-xs {
            font-size: 0.875rem !important;
            line-height: 1.35rem !important;
        }
        .text-sm {
            font-size: 1rem !important;
            line-height: 1.5rem !important;
        }
        [class*="text-[10px]"],
        [class*="text-[11px]"] {
            font-size: 0.8125rem !important;
            line-height: 1.25rem !important;
        }
        select,
        input,
        textarea,
        button {
            font-size: inherit;
        }
        /* Custom scrollbars for slick sidebar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f8fafc;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Drag & drop reorder indicators */
        .drop-above {
            box-shadow: 0 -3px 0 0 #10b981 !important;
        }
        .drop-below {
            box-shadow: 0 3px 0 0 #10b981 !important;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm shrink-0 z-10">
        <div class="flex items-center space-x-3">
            <div class="bg-emerald-600 text-white p-2.5 rounded-xl shadow-md shadow-emerald-200 flex items-center justify-center">
                <i class="fa-solid fa-road text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">道路剖面生成與渲染平台</h1>
                <p class="text-xs text-slate-500">Road Section Dynamic Generator & Rendering Platform</p>
            </div>
        </div>
        <!-- HEADER BUTTONS (Track 1) -->
        <div class="flex items-center space-x-3">
            <button onclick="importConfig()" class="px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-medium transition duration-200 flex items-center space-x-2" title="載入先前匯出的配置 JSON 檔">
                <i class="fa-solid fa-folder-open text-slate-500"></i>
                <span>匯入配置</span>
            </button>
            <button onclick="exportConfig()" class="px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-medium transition duration-200 flex items-center space-x-2" title="將目前配置存成 JSON 檔，可存檔或分享">
                <i class="fa-solid fa-file-export text-slate-500"></i>
                <span>匯出配置</span>
            </button>
            <button onclick="exportImage()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-semibold transition duration-200 shadow-lg shadow-emerald-100 flex items-center space-x-2">
                <i class="fa-solid fa-download"></i>
                <span>匯出高解析剖面圖</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar Controls -->
        <aside class="w-[460px] bg-white border-r border-slate-200 flex flex-col h-full shrink-0 shadow-lg shadow-slate-100/50">
            <!-- Sidebar Header -->
            <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">

            <!-- Road Name + Total Width Input (collapsible) -->

        <!-- Center/Right Canvas Workspace -->

    <!-- Embedded raster assets (data URLs) — keeps the canvas untainted so PNG export works from file:// -->
    <script src="assets_embedded.js"></script>

    <!-- Canvas Generation & Logic Script -->
    <script>
        // Polyfill Canvas roundRect for older embedded preview browser instances
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (typeof r === 'undefined') r = 0;
                if (typeof r === 'number') {
                    r = {tl: r, tr: r, br: r, bl: r};
                } else {
                    var defaultRadius = {tl: 0, tr: 0, br: 0, bl: 0};
                    for (var side in defaultRadius) {
                        r[side] = r[side] || defaultRadius[side];
                    }
                }
                this.beginPath();
                this.moveTo(x + r.tl, y);
                this.lineTo(x + w - r.tr, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                this.lineTo(x + w - r.br, y + h);
                this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                this.lineTo(x + r.bl, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                this.lineTo(x, y + r.tl);
                this.quadraticCurveTo(x, y, x + r.tl, y);
                this.closePath();
                return this;
            };
        }

        // Main Application State (Perfectly reproducing the 20M image structure)
        let segments = [
            { id: '1', type: 'sidewalk', name: '人行道', width: 1.5, tree: false, car: 'none', ped: 'ped1', extra: 'none' },
            { id: '2', type: 'facility', name: '公共設施帶\n整併停車', width: 2.0, tree: true, treeStyle: 'fat', car: 'none', ped: 'none', extra: 'box' },
            { id: '3', type: 'lane', name: '車道', width: 3.25, tree: false, car: 'classic_rear', ped: 'none', extra: 'none' },
            { id: '4', type: 'lane', name: '車道', width: 3.25, tree: false, car: 'classic_rear_purple', ped: 'none', extra: 'none' },
            { id: '5', type: 'lane', name: '車道', width: 3.25, tree: false, car: 'modern_front_red', ped: 'none', extra: 'none' },
            { id: '6', type: 'lane', name: '車道', width: 3.25, tree: false, car: 'modern_front_white', ped: 'none', extra: 'none' },
            { id: '7', type: 'facility', name: '公共設施帶\n整併停車', width: 2.0, tree: true, treeStyle: 'fat', car: 'none', ped: 'none', extra: 'none' },
            { id: '8', type: 'sidewalk', name: '人行道', width: 1.5, tree: false, car: 'none', ped: 'ped2', extra: 'none' }
        ];

        // Road name shown above the total-width label
        let roadName = '';
        // Locked total road width: when locked, segments auto-balance to keep the sum at `value`
        let roadWidth = { locked: false, value: 20 };

        // Presets List
        const PRESETS = {
            classic20: [
                { id: '1', type: 'sidewalk', name: '人行道', width: 1.5, tree: false, car: 'none', ped: 'ped1', extra: 'none' },
                { id: '2', type: 'facility', name: '公共設施帶\n整併停車', width: 2.0, tree: true, treeStyle: 'fat', car: 'none', ped: 'none', extra: 'box' },
                { id: '3', type: 'lane', name: '車道', width: 3.25, tree: false, car: 'classic_rear', ped: 'none', extra: 'none' },

        function loadRasterAsset(src) {
            const image = new Image();
            image.onload = () => render();
            image.onerror = () => console.warn(`Unable to load raster asset: ${src}`);
            // Prefer the embedded data-URL version: external file:// images taint the canvas
            // and make toDataURL/toBlob throw SecurityError on export.
            image.src = (window.EMBEDDED_ASSETS && window.EMBEDDED_ASSETS[src]) ? window.EMBEDDED_ASSETS[src] : src;
            return image;
        }

        // When true, raster sprites are skipped and vector fallbacks are drawn instead
        // (used as a last-resort export mode if the canvas is tainted).
        let suppressRasters = false;

        function isRasterReady(image) {
            return !suppressRasters && image && image.complete && image.naturalWidth > 0;
        }

        function drawRasterAtGround(ctx, image, x, groundY, targetHeight) {
            if (!isRasterReady(image)) return false;
            const targetWidth = targetHeight * (image.naturalWidth / image.naturalHeight);
            ctx.drawImage(image, x - targetWidth / 2, groundY - targetHeight, targetWidth, targetHeight);
            return true;
        }

        function drawRasterAtGroundFacing(ctx, image, x, groundY, targetHeight, mirror = false) {
            if (!isRasterReady(image)) return false;
            const targetWidth = targetHeight * (image.naturalWidth / image.naturalHeight);
            ctx.save();
            ctx.translate(x, groundY);
            if (mirror) ctx.scale(-1, 1);
            ctx.drawImage(image, -targetWidth / 2, -targetHeight, targetWidth, targetHeight);
            ctx.restore();
            return true;
        }

        // Sprites are exported with a transparent margin (see tools/extract_user_assets.py),
        // so anchoring the raw image bottom to the ground leaves the wheels floating in the air.
        // This scans for the lowest opaque row once (cached) and returns it as a fraction of the
        // image height, letting callers seat the visible content flat on the ground line.
        const _contentBottomCache = new WeakMap();
        function getContentBottomFraction(image) {
            if (_contentBottomCache.has(image)) return _contentBottomCache.get(image);
            let frac = 1;
            try {
                const w = image.naturalWidth, h = image.naturalHeight;
                const probe = document.createElement('canvas');
                probe.width = w; probe.height = h;
                const pctx = probe.getContext('2d', { willReadFrequently: true });
                pctx.drawImage(image, 0, 0);
                const data = pctx.getImageData(0, 0, w, h).data;
                // Solid mask only — faint de-whitening halos stay out so they can't bridge gaps.
                const solid = new Uint8Array(w * h);
                for (let i = 0; i < w * h; i++) solid[i] = data[i * 4 + 3] > 80 ? 1 : 0;
                // Seat on the bottom of the LARGEST connected blob (the vehicle body). Some sprites
                // carry thin crop-guide dashes along their edges; a naive "lowest opaque pixel" scan
                // latches onto those dashes near the image bottom and the sprite floats in mid-air.
                const label = new Int32Array(w * h).fill(-1);
                const stack = [];
                let bestBottom = -1, bestSize = 0;
                for (let s = 0; s < w * h; s++) {
                    if (!solid[s] || label[s] !== -1) continue;
                    label[s] = s; stack.length = 0; stack.push(s);
                    let size = 0, maxY = 0;
                    while (stack.length) {
                        const p = stack.pop(); size++;
                        const py = (p / w) | 0, pxx = p - py * w;
                        if (py > maxY) maxY = py;
                        if (pxx > 0 && solid[p - 1] && label[p - 1] === -1) { label[p - 1] = s; stack.push(p - 1); }
                        if (pxx < w - 1 && solid[p + 1] && label[p + 1] === -1) { label[p + 1] = s; stack.push(p + 1); }
                        if (py > 0 && solid[p - w] && label[p - w] === -1) { label[p - w] = s; stack.push(p - w); }
                        if (py < h - 1 && solid[p + w] && label[p + w] === -1) { label[p + w] = s; stack.push(p + w); }
                    }
                    if (size > bestSize) { bestSize = size; bestBottom = maxY; }
                }
                if (bestBottom >= 0) frac = (bestBottom + 1) / h;
            } catch (e) {
                frac = 1 - (8 / image.naturalHeight); // fall back to the known 8px export padding
            }
            _contentBottomCache.set(image, frac);
            return frac;
        }

        function drawParkedSprite(ctx, image, x, groundY, targetHeight, maxWidth = 0, mirror = false) {
            if (!isRasterReady(image)) return false;
            const aspect = image.naturalWidth / image.naturalHeight;
            let h = targetHeight;
            let w = h * aspect;
            if (maxWidth && w > maxWidth) { w = maxWidth; h = w / aspect; }

            ctx.save();
            ctx.translate(x, groundY + bottomPad);
            if (mirror) ctx.scale(-1, 1);
            ctx.drawImage(image, -w / 2, -h, w, h);

            return true;

                                        <option value="${seg.width}" ${![0.5, 0.8, 1.5, 4].some(v => Math.abs(seg.width - v) < 0.01) ? 'selected' : ''}>自訂 ${seg.width}m</option>
                                    </select>
                                </div>
                                <div class="flex items-center space-x-1">
                                    <span>植栽樹型:</span>
                                    <select onchange="updateSegment('${seg.id}', 'treeStyle', this.value)" class="bg-white border border-emerald-200 rounded text-[10px] py-0.5 px-1 text-emerald-800 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                                        <option value="none" ${(seg.treeStyle || 'none') === 'none' ? 'selected' : ''}>不種樹</option>
                                        <option value="fat" ${seg.treeStyle === 'fat' ? 'selected' : ''}>胖型樹</option>
                                        <option value="slim" ${seg.treeStyle === 'slim' ? 'selected' : ''}>瘦型樹</option>
                                    </select>

                            ` : ''}

                            ${seg.type === 'lane' ? `
                                <div class="flex items-center space-x-1">
                                    <span>展示車輛模型:</span>
                                    <select onchange="updateSegment('${seg.id}', 'car', this.value)" class="bg-white border border-slate-200 rounded text-[10px] py-0.5 px-1 text-slate-600 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                                        <option value="none" ${seg.car === 'none' ? 'selected' : ''}>無車輛</option>
                                        <option value="classic_rear" ${seg.car === 'classic_rear' || seg.car === 'classic_rear_purple' ? 'selected' : ''}>白色轎車</option>
                                        <option value="modern_front_white" ${seg.car === 'modern_front_white' || seg.car === 'modern_front_red' ? 'selected' : ''}>灰色休旅車</option>
                                        <option value="convertible" ${seg.car === 'convertible' ? 'selected' : ''}>敞篷跑車</option>
                                        <option value="truck" ${seg.car === 'truck' ? 'selected' : ''}>貨車</option>
                                        <option value="scooter" ${seg.car === 'scooter' ? 'selected' : ''}>機車</option>
                                        <option value="motorcycle" ${seg.car === 'motorcycle' ? 'selected' : ''}>重型機車</option>
                                    </select>
                                </div>
                                <div class="flex items-center space-x-1">
                                    <span>行駛方向:</span>
                                    <select onchange="updateSegment('${seg.id}', 'carDirection', this.value)" class="bg-white border border-slate-200 rounded text-[10px] py-0.5 px-1 text-slate-600 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                                        <option value="toward" ${(seg.carDirection || (seg.car.includes('rear') ? 'away' : 'toward')) === 'toward' ? 'selected' : ''}>朝向視線（看車頭）</option>
                                        <option value="away" ${(seg.carDirection || (seg.car.includes('rear') ? 'away' : 'toward')) === 'away' ? 'selected' : ''}>背向視線（看車尾）</option>
                                    </select>
                                </div>
                            ` : ''}

                            ${seg.type === 'bike' ? `
                                <div class="flex items-center space-x-1">
                                    <span>展示自行車:</span>
                                    <select onchange="updateSegment('${seg.id}', 'car', this.value)" class="bg-white border border-lime-200 rounded text-[10px] py-0.5 px-1 text-lime-800 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                                        <option value="none" ${seg.car === 'none' ? 'selected' : ''}>無</option>
                                        <option value="bike" ${seg.car === 'bike' ? 'selected' : ''}>自行車</option>
                                    </select>
                                </div>
                            ` : ''}

                            ${seg.type === 'sidewalk' ? `
                                <div class="flex items-center space-x-1">
                                    <span>行人剪影配置:</span>
                                    <select onchange="updateSegment('${seg.id}', 'ped', this.value)" class="bg-white border border-slate-200 rounded text-[10px] py-0.5 px-1 text-slate-600 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                                        <option value="none" ${seg.ped === 'none' ? 'selected' : ''}>無</option>
                                        <option value="ped1" ${seg.ped === 'ped1' ? 'selected' : ''}>牽狗散步</option>
                                        <option value="ped2" ${seg.ped === 'ped2' ? 'selected' : ''}>大人牽小孩</option>
                                        <option value="ped3" ${seg.ped === 'ped3' ? 'selected' : ''}>城市散步</option>
                                        <option value="ped4" ${seg.ped === 'ped4' ? 'selected' : ''}>市民慢跑</option>
                                        <option value="ped5" ${seg.ped === 'ped5' ? 'selected' : ''}>提購物袋</option>
                                        <option value="cyclist" ${seg.ped === 'cyclist' ? 'selected' : ''}>騎自行車</option>
                                    </select>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;

                // --- Drag & Drop reorder wiring (handle = grip icon only, so inputs stay usable) ---
                const handle = card.querySelector('.drag-handle');
                handle.addEventListener('mousedown', () => { card.draggable = true; });
                card.addEventListener('dragstart', (e) => {
                    dragSrcIndex = index;
                    e.dataTransfer.effectAllowed = 'move';
                    setTimeout(() => card.classList.add('opacity-40'), 0);
                });
                card.addEventListener('dragend', () => {
                    card.draggable = false;
                    card.classList.remove('opacity-40');
                    clearDropIndicators();
                    dragSrcIndex = null;
                });
                card.addEventListener('dragover', (e) => {
                    if (dragSrcIndex === null) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    const rect = card.getBoundingClientRect();
                    const before = (e.clientY - rect.top) < rect.height / 2;
                    clearDropIndicators();
                    if (index !== dragSrcIndex) {
                        card.classList.add(before ? 'drop-above' : 'drop-below');
                    }
                });
                card.addEventListener('drop', (e) => {
                    if (dragSrcIndex === null) return;
                    e.preventDefault();
                    const rect = card.getBoundingClientRect();
                    const before = (e.clientY - rect.top) < rect.height / 2;
                    performDrop(index, before);
                });

                segmentsContainer.appendChild(card);
            });

            // Update Header Total Badge
            totalMetersBadge.innerText = `總寬 ${totalM.toFixed(2)} M`;
        }

        // --- DRAG & DROP REORDER SUPPORT ---
        let dragSrcIndex = null;

        function clearDropIndicators() {
            segmentsContainer.querySelectorAll('.drop-above, .drop-below').forEach(el => {
                el.classList.remove('drop-above', 'drop-below');
            });
        }

        function performDrop(targetIndex, before) {
            if (dragSrcIndex === null) return;
            let insertAt = before ? targetIndex : targetIndex + 1;
            if (dragSrcIndex < insertAt) insertAt--;
            if (insertAt !== dragSrcIndex) {
                const [moved] = segments.splice(dragSrcIndex, 1);
                segments.splice(insertAt, 0, moved);
                renderSidebar();
                render();
                saveState();
            }
            dragSrcIndex = null;
            clearDropIndicators();
        }

        // Clear segment highlight when the cursor leaves the whole list (instead of per-card flicker)
        segmentsContainer.addEventListener('mouseleave', () => clearActiveSegment());

        function setActiveSegment(index) {
            if (activeSegmentIndex === index) return; // Skip redundant re-renders while hovering
            activeSegmentIndex = index;
            render();
        }

        function clearActiveSegment() {
            if (activeSegmentIndex === null) return;
            activeSegmentIndex = null;
            render();
        }

        // --- PERSISTENCE / UNDO ---
        const STORAGE_KEY = 'roadSectionPlatformState_v1';
        let lastSnapshot = null; // For one-step undo (delete / preset overwrite)

        function getBuildingSettings() {
            return {
                leftFloors: leftBuildingFloors.value,
                rightFloors: rightBuildingFloors.value,
                leftPeople: leftArcadePeople.value,
                rightPeople: rightArcadePeople.value,
                leftSign: leftArcadeSign.value,
                rightSign: rightArcadeSign.value,
                roadName: roadName,
                roadWidthLocked: roadWidth.locked,
                roadWidthValue: roadWidth.value
            };
        }

        function applyBuildingSettings(b) {
            if (!b) return;
            if (b.leftFloors) leftBuildingFloors.value = b.leftFloors;
            if (b.rightFloors) rightBuildingFloors.value = b.rightFloors;
            if (b.leftPeople) leftArcadePeople.value = b.leftPeople;
            if (b.rightPeople) rightArcadePeople.value = b.rightPeople;
            if (b.leftSign) leftArcadeSign.value = b.leftSign;
            if (b.rightSign) rightArcadeSign.value = b.rightSign;
            if (b.roadName !== undefined) { roadName = b.roadName; roadNameInput.value = b.roadName; }
            if (b.roadWidthValue !== undefined) roadWidth.value = b.roadWidthValue;
            if (b.roadWidthLocked !== undefined) roadWidth.locked = b.roadWidthLocked;
            applyWidthLockUI();
        }

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    segments,
                    building: getBuildingSettings()
                }));
            } catch (e) { /* Storage unavailable (private mode etc.) — silently skip */ }
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return false;
                const data = JSON.parse(raw);
                if (!Array.isArray(data.segments) || data.segments.length === 0) return false;
                segments = data.segments;
                applyBuildingSettings(data.building);
                return true;
            } catch (e) { return false; }
        }

        function snapshotState() {
            lastSnapshot = JSON.stringify({ segments, building: getBuildingSettings() });
        }

        function undoLastAction() {
            if (!lastSnapshot) return;
            const data = JSON.parse(lastSnapshot);
            segments = data.segments;
            applyBuildingSettings(data.building);
            lastSnapshot = null;
            renderSidebar();
            render();
            saveState();
            showToast('已復原至上一個配置', 'info');
        }

        // --- CONFIG EXPORT / IMPORT (JSON) ---
        function exportConfig() {
            const totalM = segments.reduce((sum, s) => sum + s.width, 0).toFixed(1);
            const payload = {
                app: '道路剖面生成與渲染平台',
                version: 1,
                exportedAt: new Date().toISOString(),
                segments,
                building: getBuildingSettings()
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `道路剖面配置_${segments.length}區段_${totalM}M.json`;
            a.href = url;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('配置 JSON 已匯出，可存檔或分享', 'success');
        }

        function importConfig() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,application/json';
            input.onchange = () => {
                const file = input.files && input.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const data = JSON.parse(reader.result);
                        const segs = Array.isArray(data) ? data : data.segments;
                        if (!Array.isArray(segs) || segs.length === 0 || !segs.every(s => s && s.type && s.width)) {
                            showToast('檔案格式不正確，匯入失敗', 'error');
                            return;
                        }
                        snapshotState();
                        segments = segs;
                        if (!Array.isArray(data)) applyBuildingSettings(data.building);
                        renderSidebar();
                        render();
                        saveState();
                        showToast('已匯入配置！', 'success', '復原', undoLastAction);
                    } catch (e) {
                        showToast('無法解析 JSON 檔案', 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Action Functions
        function addSegment(type) {
            const id = Math.random().toString(36).substr(2, 9);
            let name = '新區塊';
            let width = 2.0;

            if (type === 'sidewalk') {
                name = '人行道';
                width = 1.5;
            } else if (type === 'facility') {
                name = '公共設施帶\n整併停車';
                width = 2.0;
            } else if (type === 'lane') {
                name = '車道';
                width = 3.25;
            } else if (type === 'median') {
                name = '中央分隔島';
                width = 1.5;
            } else if (type === 'bike') {
                name = '自行車道';
                width = 1.8;
            }

            segments.push({
                id,
                type,
                name,
                width,
                tree: type === 'facility',
                treeStyle: type === 'facility' ? 'fat' : 'none',
                car: type === 'lane' ? 'modern_front_white' : type === 'bike' ? 'bike' : 'none',
                ped: type === 'sidewalk' ? 'ped1' : 'none',
                extra: 'none',
                streetAsset: 'none',
                carDirection: type === 'lane' ? 'toward' : undefined
            });

            // Locked total: shrink the other segments to make room for the new one
            if (roadWidth.locked) rebalanceLocked(segments.length - 1);

            renderSidebar();
            render();
            saveState();
            // Scroll the list to the newly added card so it is immediately visible
            if (segmentsContainer.lastElementChild) {
                segmentsContainer.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function deleteSegment(id) {
            const seg = segments.find(s => s.id === id);
            snapshotState();
            segments = segments.filter(s => s.id !== id);
            // Locked total: grow the remaining segments to keep the sum fixed
            if (roadWidth.locked && segments.length > 0) fitAllToTarget(roadWidth.value);
            renderSidebar();
            render();
            saveState();
            showToast(`已刪除「${(seg ? seg.name : '路段').split('\n')[0]}」`, 'info', '復原', undoLastAction);
        }

        // Keep standard field updates (names, select menus)
        function updateSegment(id, key, value) {
            const index = segments.findIndex(seg => seg.id === id);
            if (index !== -1) {
                if (key === 'width') {
                    const limits = getWidthLimits(segments[index]);
                    const parsedWidth = parseFloat(value);
                    segments[index].width = Math.max(
                        limits.min,
                        Math.min(limits.max, isNaN(parsedWidth) ? limits.min : parsedWidth)
                    );
                    if (roadWidth.locked) rebalanceLocked(index);
                } else if (key === 'treeStyle') {
                    segments[index].treeStyle = value;
                    segments[index].tree = value !== 'none';
                } else if (key === 'tree') {
                    segments[index][key] = value;
                } else {
                    segments[index][key] = value;
                }
                renderSidebar();
                render();
                saveState();
            }
        }

        function getWidthLimits(seg) {
            // Lanes allow a wider experimental range for teaching demos;
            // values outside the recommended 2.8–3.5M show an inline warning instead of being blocked.
            if (seg.type === 'lane') return { min: 2.0, max: 8 };
            if (seg.type === 'bike') return { min: 1, max: 5 };
            if (seg.type === 'sidewalk') return { min: 1, max: 15 };
            return { min: 0.5, max: 15 };
        }

        // High-performance real-time synchronization specifically for typed inputs (solves input focus loss)
        function syncWidth(id, value, source) {
            const index = segments.findIndex(seg => seg.id === id);
            if (index !== -1) {
                let parsedVal = parseFloat(value);
                // Return early if the user is typing/editing decimals (e.g. "2.") to prevent parsing crash
                if (isNaN(parsedVal)) return;
                const limits = getWidthLimits(segments[index]);
                parsedVal = Math.max(limits.min, Math.min(limits.max, parsedVal));

                // Update model memory
                segments[index].width = parsedVal;

                // When the total is locked, balance the other segments live so the sum stays fixed
                if (roadWidth.locked) { rebalanceLocked(index); syncAllWidthInputs(segments[index].id); }

                // Instantly sync peer input control visually without re-creating DOM elements
                if (source === 'num') {
                    const rangeInput = document.getElementById(`range-width-${id}`);
                    if (rangeInput) rangeInput.value = parsedVal;
                } else if (source === 'range') {
                    const numInput = document.getElementById(`num-width-${id}`);
                    if (numInput) numInput.value = parsedVal;
                }

                // Live-toggle lane width recommendation warning without DOM rebuild
                if (segments[index].type === 'lane') {
                    const warnEl = document.getElementById(`width-warn-${id}`);
                    const numEl = document.getElementById(`num-width-${id}`);
                    const outOfRec = parsedVal < 2.799 || parsedVal > 3.501;
                    if (warnEl) warnEl.classList.toggle('hidden', !outOfRec);
                    if (numEl) {
                        numEl.classList.toggle('border-amber-400', outOfRec);
                        numEl.classList.toggle('bg-amber-50/60', outOfRec);
                        numEl.classList.toggle('border-slate-200', !outOfRec);
                        numEl.classList.toggle('bg-white', !outOfRec);
                    }
                }

                // Smoothly update top-level metrics
                let totalM = segments.reduce((sum, s) => sum + s.width, 0);
                totalMetersBadge.innerText = `總寬 ${totalM.toFixed(2)} M`;

                // Re-render only canvas graphics to keep standard UI completely functional
                render();
                saveState();
            }
        }

        // Apply strict limit guidelines on losing input focus
        function handleWidthBlur(id, value) {
            const index = segments.findIndex(seg => seg.id === id);
            if (index !== -1) {
                let parsedVal = parseFloat(value);
                const limits = getWidthLimits(segments[index]);
                if (isNaN(parsedVal) || parsedVal < limits.min) {
                    parsedVal = limits.min;
                } else if (parsedVal > limits.max) {
                    parsedVal = limits.max;
                }
                segments[index].width = parsedVal;
                if (roadWidth.locked) rebalanceLocked(index);

                // Perform safe structural re-render to align values
                renderSidebar();
                render();
                saveState();
            }
        }

        // --- LOCKED TOTAL WIDTH: AUTO-BALANCE ENGINE ---
        const W_STEP = 0.05;
        const roundW = v => Math.round(v / W_STEP) * W_STEP;

        // Scale a set of segment indices so they sum exactly to `target`, respecting per-type min/max.
        function fitIndicesToTarget(idxs, target) {
            if (idxs.length === 0) return;
            const cur = idxs.reduce((a, i) => a + segments[i].width, 0) || idxs.length;
            const scale = target / cur;
            idxs.forEach(i => {
                const l = getWidthLimits(segments[i]);
                segments[i].width = Math.max(l.min, Math.min(l.max, roundW(segments[i].width * scale)));
            });
            // Iteratively absorb the rounding/clamping residual
            for (let pass = 0; pass < 12; pass++) {
                const s = idxs.reduce((a, i) => a + segments[i].width, 0);
                const diff = roundW(target - s);
                if (Math.abs(diff) < 0.0001) break;
                const pool = idxs.filter(i => {
                    const l = getWidthLimits(segments[i]);
                    return diff > 0 ? segments[i].width < l.max - 1e-9 : segments[i].width > l.min + 1e-9;
                });
                if (pool.length === 0) break;
                const per = diff / pool.length;
                let applied = 0;
                pool.forEach(i => {
                    const l = getWidthLimits(segments[i]);
                    const nw = Math.max(l.min, Math.min(l.max, roundW(segments[i].width + per)));
                    applied += (nw - segments[i].width);
                    segments[i].width = nw;
                });
                if (Math.abs(applied) < 0.0001) {
                    const i = pool[0];
                    const l = getWidthLimits(segments[i]);
                    segments[i].width = Math.max(l.min, Math.min(l.max, roundW(segments[i].width + diff)));
                    break;
                }
            }
        }

        function fitAllToTarget(target) {
            fitIndicesToTarget(segments.map((_, i) => i), target);
        }

        // Keep `keepIndex` as edited; redistribute the remainder across the other segments.
        function rebalanceLocked(keepIndex) {
            if (!roadWidth.locked) return;
            const target = roadWidth.value;
            const others = segments.map((_, i) => i).filter(i => i !== keepIndex);
            if (others.length === 0) {
                const l = getWidthLimits(segments[keepIndex]);
                segments[keepIndex].width = Math.max(l.min, Math.min(l.max, roundW(target)));
                return;
            }
            const minSum = others.reduce((a, i) => a + getWidthLimits(segments[i]).min, 0);
            let othersTarget = roundW(target - segments[keepIndex].width);
            if (othersTarget < minSum) {
                othersTarget = minSum;
                const l = getWidthLimits(segments[keepIndex]);
                segments[keepIndex].width = Math.max(l.min, Math.min(l.max, roundW(target - minSum)));
            }
            fitIndicesToTarget(others, othersTarget);
        }

        // Live-refresh every segment's width inputs from the model (skip the one being actively edited).
        function syncAllWidthInputs(skipId) {
            segments.forEach(s => {
                if (s.id === skipId) return;
                const n = document.getElementById(`num-width-${s.id}`);
                const r = document.getElementById(`range-width-${s.id}`);
                if (n) n.value = s.width;
                if (r) r.value = s.width;
            });
        }

        // Slider release while locked: rebuild the sidebar so all values settle.
        function settleWidthLock() {
            if (roadWidth.locked) { renderSidebar(); render(); saveState(); }
        }

        function applyWidthLockUI() {
            if (!roadWidthLockBtn) return;
            if (roadWidth.locked) {
                roadWidthInput.value = roadWidth.value.toFixed(2);
                roadWidthLockBtn.innerHTML = '<i class="fa-solid fa-lock"></i> 已鎖定';
                roadWidthLockBtn.className = 'shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold border transition-all bg-emerald-600 border-emerald-600 text-white';
                roadWidthHint.textContent = '已鎖定：調整／新增／刪除區段會自動配平其他區段，維持總寬不變';
            } else {
                roadWidthLockBtn.innerHTML = '<i class="fa-solid fa-lock-open"></i> 未鎖定';
                roadWidthLockBtn.className = 'shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold border transition-all bg-slate-100 border-slate-200 text-slate-600';
                roadWidthHint.textContent = '輸入目標總寬後按「鎖定」，之後調整／新增／刪除區段會自動配平其他區段';
            }
        }

        function toggleWidthLock() {
            if (!roadWidth.locked) {
                const v = parseFloat(roadWidthInput.value);
                const sum = segments.reduce((a, s) => a + s.width, 0);
                const target = (!isNaN(v) && v > 0) ? v : sum;
                const minSum = segments.reduce((a, s) => a + getWidthLimits(s).min, 0);
                if (target < minSum) {
                    showToast(`總寬不可小於各區段最小值合計 ${minSum.toFixed(2)} M`, 'error');
                    return;
                }
                roadWidth.value = roundW(target);
                roadWidth.locked = true;
                fitAllToTarget(roadWidth.value);
                showToast(`已鎖定路幅總寬度 ${roadWidth.value.toFixed(2)} M`, 'success');
            } else {
                roadWidth.locked = false;
                showToast('已解除總寬鎖定', 'info');
            }
            applyWidthLockUI();
            renderSidebar();
            render();
            saveState();
        }

        function moveSegment(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex >= 0 && targetIndex < segments.length) {
                const temp = segments[index];
                segments[index] = segments[targetIndex];
                segments[targetIndex] = temp;
                renderSidebar();
                render();
                saveState();
            }
        }

        function applyPreset(presetKey) {
            if (PRESETS[presetKey]) {
                snapshotState();
                segments = JSON.parse(JSON.stringify(PRESETS[presetKey]));
                // A preset defines its own total width — release any width lock and adopt the preset's width
                if (roadWidth.locked) {
                    roadWidth.locked = false;
                    roadWidth.value = roundW(segments.reduce((a, s) => a + s.width, 0));
                    applyWidthLockUI();
                }
                renderSidebar();
                render();
                saveState();
                showToast("已載入指定道路配置！", "success", "復原", undoLastAction);

        // Custom elegant premium non-blocking toast alert (Avoid forbidden alert())
        // Optional actionLabel/actionFn renders an inline action button (e.g. 復原)
        let activeToast = null;
        function showToast(message, type = 'success', actionLabel = null, actionFn = null) {
            if (activeToast) { activeToast.remove(); activeToast = null; }
            const toast = document.createElement('div');
            toast.className = `fixed bottom-24 left-1/2 -translate-x-1/2 px-4 py-3 rounded-2xl shadow-xl text-xs font-bold z-50 transition-all duration-300 transform translate-y-3 opacity-0 flex items-center space-x-2 border ${
                type === 'success' ? 'bg-emerald-600 text-white border-emerald-500 shadow-emerald-200' :
                type === 'error' ? 'bg-rose-600 text-white border-rose-500 shadow-rose-200' :
                'bg-slate-900 text-white border-slate-800 shadow-slate-950/20'
            }`;

            toast.innerHTML = `
                <i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-info'} text-sm"></i>
                <span>${message}</span>
            `;

            if (actionLabel && typeof actionFn === 'function') {
                const actionBtn = document.createElement('button');
                actionBtn.className = 'ml-2 px-2.5 py-1 rounded-lg bg-white/20 hover:bg-white/35 border border-white/40 text-white text-xs font-bold transition';
                actionBtn.textContent = actionLabel;
                actionBtn.onclick = () => {
                    actionFn();
                    toast.remove();
                    activeToast = null;
                };
                toast.appendChild(actionBtn);
            }

            document.body.appendChild(toast);
            activeToast = toast;

            // Animate In
            setTimeout(() => {
                toast.classList.remove('translate-y-3', 'opacity-0');
            }, 50);

            // Animate Out & Destroy (longer linger when an action is attached)
            setTimeout(() => {
                toast.classList.add('translate-y-3', 'opacity-0');
                setTimeout(() => { toast.remove(); if (activeToast === toast) activeToast = null; }, 300);
            }, actionLabel ? 6000 : 3200);

        function drawClassicScooterFront(ctx, x, y, scale, color) {
            ctx.save();
            ctx.translate(x, y);

            // Ground Shadow
            ctx.fillStyle = "rgba(15, 23, 42, 0.15)";
            ctx.beginPath();
            ctx.ellipse(0, -1 * scale, 10 * scale, 2 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            // Front wheel
            ctx.fillStyle = "#334155";
            ctx.beginPath();
            ctx.roundRect(-2 * scale, -11 * scale, 4 * scale, 11 * scale, 1 * scale);
            ctx.fill();

            // Front Mudguard
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.ellipse(0, -10 * scale, 3.5 * scale, 2.5 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            // Leg Shield / Front Apron (Highly recognizable Vespa face)
            ctx.fillStyle = color;
            ctx.strokeStyle = "#1e293b";
            ctx.lineWidth = 1.2 * scale;
            ctx.beginPath();
            ctx.moveTo(-7 * scale, -11 * scale);
            ctx.quadraticCurveTo(-9 * scale, -23 * scale, -6 * scale, -25 * scale);
            ctx.lineTo(6 * scale, -25 * scale);
            ctx.quadraticCurveTo(9 * scale, -23 * scale, 7 * scale, -11 * scale);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Chrome horn grille in center apron
            ctx.strokeStyle = "#94a3b8";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, -15 * scale);
            ctx.lineTo(0, -21 * scale);
            ctx.stroke();

            // Handlebars / Instrument pod
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(-5.5 * scale, -30 * scale, 11 * scale, 3 * scale, 1 * scale);
            ctx.fill();
            ctx.stroke();

            // Large retro circular headlight (Yellow glow)
            ctx.fillStyle = "#fef08a";
            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 1 * scale;
            ctx.beginPath();
            ctx.arc(0, -30 * scale, 3 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Left & Right chrome mirrors
            ctx.strokeStyle = "#64748b";
            ctx.lineWidth = 0.8 * scale;
            
            // Left Mirror
            ctx.beginPath();
            ctx.moveTo(-3 * scale, -30 * scale);
            ctx.lineTo(-6 * scale, -35 * scale);
            ctx.stroke();
            ctx.fillStyle = "#cbd5e1";
            ctx.beginPath();
            ctx.arc(-6 * scale, -35 * scale, 1.8 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Right Mirror
            ctx.beginPath();
            ctx.moveTo(3 * scale, -30 * scale);
            ctx.lineTo(6 * scale, -35 * scale);
            ctx.stroke();
            ctx.fillStyle = "#cbd5e1";
            ctx.beginPath();
            ctx.arc(6 * scale, -35 * scale, 1.8 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Cute small orange circular blinker lights
            ctx.fillStyle = "#f97316";
            ctx.beginPath();
            ctx.arc(-5 * scale, -19 * scale, 1.1 * scale, 0, Math.PI * 2);
            ctx.arc(5 * scale, -19 * scale, 1.1 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // --- PLAN / TOP-DOWN DRAWINGS ---
        function drawTopViewVehicle(ctx, x, y, widthPx, lengthPx, type) {
            ctx.save();
            ctx.translate(x, y);

            if (type.includes('classic')) {
                // Classic top-view white SUV or purple car
                const w = widthPx * 0.55;
                const l = lengthPx * 0.85;

                // Car shadow
                ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
                ctx.beginPath();
                ctx.roundRect(-w/2 + 2, -l/2 + 3, w, l, 8);
                ctx.fill();

                // Body color selector
                ctx.fillStyle = type.includes('purple') ? "#cbd2e6" : "#f8fafc";
                ctx.strokeStyle = "#475569";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(-w/2, -l/2, w, l, 6);
                ctx.fill();
                ctx.stroke();

                // Windshield window blocks
                ctx.fillStyle = "#1e293b";
                ctx.beginPath();
                ctx.roundRect(-w/2 + 3, -l/4, w - 6, l/5, 2);
                ctx.fill();

            } else {
                // Sleek modern vehicle (eg. truck or sports car)
                const w = widthPx * 0.6;
                const l = lengthPx * 0.95;

                // Shadow
                ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
                ctx.beginPath();
                ctx.roundRect(-w/2 + 2, -l/2 + 4, w, l, 5);
                ctx.fill();

                // Body
                ctx.fillStyle = "#e2e8f0";
                ctx.strokeStyle = "#334155";
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.roundRect(-w/2, -l/2, w, l, 4);
                ctx.fill();
                ctx.stroke();

                // Cabin glass & trunk split
                ctx.fillStyle = "#475569";
                ctx.beginPath();
                ctx.roundRect(-w/2 + 2.5, -l/3, w - 5, l/3.5, 3);
                ctx.fill();
                ctx.stroke();

                ctx.strokeStyle = "#334155";
                ctx.beginPath();
                ctx.moveTo(-w/2, l/8);
                ctx.lineTo(w/2, l/8);
                ctx.stroke();
            }

            ctx.restore();
        }

        // Draw beautiful angled scooter parking top-view.
        // side: 'left' keeps the base orientation (noses toward the left/outer edge);
        // 'right' mirrors horizontally so noses face the right/outer edge → left & right stay symmetric.
        function drawScooterParkingTop(ctx, x, y, widthPx, heightPx, side) {
            ctx.save();
            ctx.translate(x, y);
            if (side === 'right') ctx.scale(-1, 1);  // mirror for the right-hand facility zone

            // Clean white boundary parking lines
            ctx.strokeStyle = "rgba(255, 255, 255, 0.85)";
            ctx.lineWidth = 1.8;

            // Render angled bays at 45 degrees
            let index = 0;
            const colors = ["#0d9488", "#0ea5e9", "#ef4444", "#f59e0b"]; // Beautiful diverse scooter body colors
            for (let offset = -heightPx/2 + 15; offset < heightPx/2 - 10; offset += 24) {
                ctx.beginPath();
                ctx.moveTo(-widthPx/2 + 5, offset);
                ctx.lineTo(widthPx/2 - 5, offset - 15);
                ctx.stroke();

                // Draw miniature parked scooters (Using high fidelity Vespa topview rendering!)
                if (toggleDecorations.checked) {
                    const chosenColor = colors[index % colors.length];
                    
                    // Inline Scooter topview — rotate to lie PARALLEL to the bay divider lines.
                    // Bay line runs from (-w/2+5, offset) to (w/2-5, offset-15) → direction atan2(-15, w-10);
                    // the scooter body's long axis (local -Y) is aligned to it (nose toward the outer edge).
                    const bayAngle = Math.atan2(-15, widthPx - 10);
                    ctx.save();
                    // Centre the scooter INSIDE the bay (between this divider line and the next),
                    // not on the line. At x=0 the line sits at offset-7.5 and lines step 24px apart,
                    // so the cell centre is offset-7.5 + 12 = offset+4.5.
                    ctx.translate(0, offset + 4.5);
                    ctx.rotate(bayAngle - Math.PI / 2);

                    // Body shadow
                    ctx.fillStyle = "rgba(15, 23, 42, 0.15)";
                    ctx.beginPath();
                    ctx.ellipse(1, 2, 3.5, 8, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Main fairing shield & frame
                    ctx.fillStyle = chosenColor;
                    ctx.strokeStyle = "#1e293b";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 3.2, 8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Handlebars
                    ctx.strokeStyle = "#475569";
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(-4.5, -6);
                    ctx.lineTo(4.5, -6);
                    ctx.stroke();

                    // Leather Seat pad
                    ctx.fillStyle = "#334155";
                    ctx.beginPath();
                    ctx.ellipse(0, 1.2, 2, 4.2, 0, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
                index++;
            }

            ctx.restore();
        }

        // Unified architectural illustration system for people and vehicles.
        function drawArchitecturalPerson(ctx, x, y, scale, pose, colors) {
            ctx.save();
            ctx.translate(x, y);
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            ctx.fillStyle = "rgba(15, 23, 42, 0.10)";
            ctx.beginPath();
            ctx.ellipse(0, 0, 7 * scale, 2 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = "#273444";
            ctx.lineWidth = 2.2 * scale;

            const walking = pose === "walk";
            const bodyLean = walking ? 2 : 0;

            // Legs use broad, readable strokes instead of tiny anatomy.
            ctx.beginPath();
            ctx.moveTo(bodyLean * scale, -17 * scale);
            ctx.lineTo((walking ? -5 : -3) * scale, -7 * scale);
            ctx.lineTo((walking ? -8 : -4) * scale, 0);
            ctx.moveTo(bodyLean * scale, -17 * scale);
            ctx.lineTo((walking ? 6 : 3) * scale, -8 * scale);
            ctx.lineTo((walking ? 8 : 4) * scale, 0);
            ctx.stroke();

            // Coat / torso.
            ctx.fillStyle = colors.coat;
            ctx.strokeStyle = "#273444";
            ctx.lineWidth = 1.5 * scale;
            ctx.beginPath();
            ctx.moveTo(-6 * scale + bodyLean * scale, -34 * scale);
            ctx.quadraticCurveTo(bodyLean * scale, -38 * scale, 6 * scale + bodyLean * scale, -34 * scale);
            ctx.lineTo(5 * scale + bodyLean * scale, -17 * scale);
            ctx.lineTo(-5 * scale + bodyLean * scale, -17 * scale);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Arms.
            ctx.strokeStyle = "#273444";
            ctx.lineWidth = 2 * scale;
            ctx.beginPath();
            if (pose === "wave") {
                ctx.moveTo(-5 * scale, -31 * scale);
                ctx.lineTo(-11 * scale, -37 * scale);
                ctx.lineTo(-10 * scale, -46 * scale);
                ctx.moveTo(5 * scale, -31 * scale);
                ctx.lineTo(10 * scale, -23 * scale);
            } else if (pose === "guitar") {
                ctx.moveTo(-5 * scale, -30 * scale);
                ctx.lineTo(-8 * scale, -23 * scale);
                ctx.moveTo(5 * scale, -30 * scale);
                ctx.lineTo(10 * scale, -24 * scale);
            } else {
                ctx.moveTo(-5 * scale + bodyLean * scale, -30 * scale);
                ctx.lineTo((walking ? 5 : -8) * scale, -22 * scale);
                ctx.moveTo(5 * scale + bodyLean * scale, -30 * scale);
                ctx.lineTo((walking ? -5 : 8) * scale, -22 * scale);
            }
            ctx.stroke();

            // Head and simple hair block.
            ctx.fillStyle = colors.skin;
            ctx.beginPath();
            ctx.arc(bodyLean * scale, -42 * scale, 5 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = colors.hair;
            ctx.beginPath();
            ctx.arc((bodyLean - 1) * scale, -44 * scale, 5 * scale, Math.PI, Math.PI * 2);
            ctx.quadraticCurveTo(5 * scale, -40 * scale, 4 * scale, -45 * scale);
            ctx.fill();

            if (pose === "guitar") {
                ctx.save();
                ctx.translate(2 * scale, -23 * scale);
                ctx.rotate(-0.28);
                ctx.fillStyle = "#b7794b";
                ctx.strokeStyle = "#273444";
                ctx.lineWidth = 1.3 * scale;
                ctx.beginPath();
                ctx.ellipse(-2 * scale, 0, 6 * scale, 5 * scale, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(3 * scale, -1 * scale);
                ctx.lineTo(15 * scale, -1 * scale);
                ctx.stroke();
                ctx.restore();
            }

            ctx.restore();
        }

        function drawArtsyPedestrian(ctx, x, y, scale, type) {
            // Bicycle rider: reuse the vector cyclist (no raster, exports cleanly)
            if (type === 'cyclist') {
                drawCyclistFront(ctx, x, y, scale * 1.05);
                return;
            }
            const people = {
                ped1: rasterAssets.dogWalker,
                ped2: rasterAssets.parentChild,
                ped3: rasterAssets.cityWalker,
                ped4: rasterAssets.jogger,
                ped5: rasterAssets.shopper
            };
            const image = people[type] || rasterAssets.cityWalker;
            if (drawRasterAtGround(ctx, image, x, y, 70 * scale)) return;

            drawArchitecturalPerson(ctx, x, y, scale, "walk", {
                coat: "#6c7f9b",
                skin: "#d8a47f",
                hair: "#273444"
            });
        }

        function drawArchitecturalCar(ctx, x, y, scale, bodyColor, mode) {
            ctx.save();
            ctx.translate(x, y);
            ctx.lineJoin = "round";

            ctx.fillStyle = "rgba(15, 23, 42, 0.12)";
            ctx.beginPath();
            ctx.ellipse(0, -1 * scale, 31 * scale, 4 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#273444";
            ctx.beginPath();
            ctx.roundRect(-24 * scale, -8 * scale, 8 * scale, 8 * scale, 2 * scale);
            ctx.roundRect(16 * scale, -8 * scale, 8 * scale, 8 * scale, 2 * scale);
            ctx.fill();

            ctx.fillStyle = bodyColor;
            ctx.strokeStyle = "#273444";
            ctx.lineWidth = 1.8 * scale;
            ctx.beginPath();
            if (mode === "retro") {
                ctx.moveTo(-27 * scale, -7 * scale);
                ctx.quadraticCurveTo(-27 * scale, -24 * scale, -18 * scale, -27 * scale);
                ctx.quadraticCurveTo(-13 * scale, -45 * scale, 0, -46 * scale);
                ctx.quadraticCurveTo(13 * scale, -45 * scale, 18 * scale, -27 * scale);
                ctx.quadraticCurveTo(27 * scale, -24 * scale, 27 * scale, -7 * scale);
            } else {
                ctx.moveTo(-29 * scale, -7 * scale);
                ctx.lineTo(-26 * scale, -24 * scale);
                ctx.quadraticCurveTo(-17 * scale, -28 * scale, -14 * scale, -39 * scale);
                ctx.quadraticCurveTo(0, -47 * scale, 14 * scale, -39 * scale);
                ctx.quadraticCurveTo(17 * scale, -28 * scale, 26 * scale, -24 * scale);
                ctx.lineTo(29 * scale, -7 * scale);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#435568";
            ctx.beginPath();
            if (mode === "retro") {
                ctx.moveTo(-13 * scale, -28 * scale);
                ctx.quadraticCurveTo(-9 * scale, -42 * scale, 0, -42 * scale);
                ctx.quadraticCurveTo(9 * scale, -42 * scale, 13 * scale, -28 * scale);
            } else {
                ctx.moveTo(-15 * scale, -29 * scale);
                ctx.quadraticCurveTo(-9 * scale, -40 * scale, 0, -42 * scale);
                ctx.quadraticCurveTo(9 * scale, -40 * scale, 15 * scale, -29 * scale);
            }
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = mode === "rear" ? "#c95f59" : "#f7e7b5";
            ctx.beginPath();
            ctx.roundRect(-23 * scale, -19 * scale, 9 * scale, 5 * scale, 2 * scale);
            ctx.roundRect(14 * scale, -19 * scale, 9 * scale, 5 * scale, 2 * scale);
            ctx.fill();

            ctx.fillStyle = "#273444";
            ctx.beginPath();
            ctx.roundRect(-11 * scale, -14 * scale, 22 * scale, 5 * scale, 2 * scale);
            ctx.fill();

            ctx.fillStyle = "#f8fafc";
            ctx.beginPath();
            ctx.roundRect(-6 * scale, -8 * scale, 12 * scale, 3 * scale, 1 * scale);
            ctx.fill();
            ctx.restore();
        }

        function drawClassicCarFront(ctx, x, y, scale, bodyColor) {
            if (drawRasterAtGround(ctx, rasterAssets.sedanFront, x, y + (4 * scale), 52 * scale)) return;
            drawArchitecturalCar(ctx, x, y, scale, bodyColor, "retro");
        }

        function drawClassicCarRear(ctx, x, y, scale, bodyColor) {
            if (drawRasterAtGround(ctx, rasterAssets.sedanRear, x, y, 52 * scale)) return;
            drawArchitecturalCar(ctx, x, y, scale, bodyColor, "rear");
        }

        function drawModernCarFront(ctx, x, y, scale, bodyColor) {
            if (drawRasterAtGround(ctx, rasterAssets.suvFront, x, y + (4 * scale), 56 * scale)) return;
            drawArchitecturalCar(ctx, x, y, scale, bodyColor, "modern");
        }

        function drawModernCarRear(ctx, x, y, scale, bodyColor) {
            if (drawRasterAtGround(ctx, rasterAssets.suvRear, x, y, 56 * scale)) return;
            drawArchitecturalCar(ctx, x, y, scale, bodyColor, "rear");
        }

        function drawClassicScooterFront(ctx, x, y, scale, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = "rgba(15, 23, 42, 0.11)";
            ctx.beginPath();
            ctx.ellipse(0, -1 * scale, 9 * scale, 2 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#273444";
            ctx.beginPath();
            ctx.roundRect(-2.5 * scale, -12 * scale, 5 * scale, 12 * scale, 2 * scale);
            ctx.fill();

            ctx.fillStyle = color;
            ctx.strokeStyle = "#273444";
            ctx.lineWidth = 1.4 * scale;
            ctx.beginPath();
            ctx.moveTo(-8 * scale, -9 * scale);
            ctx.quadraticCurveTo(-10 * scale, -24 * scale, -5 * scale, -29 * scale);
            ctx.quadraticCurveTo(0, -33 * scale, 5 * scale, -29 * scale);
            ctx.quadraticCurveTo(10 * scale, -24 * scale, 8 * scale, -9 * scale);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.strokeStyle = "#273444";
            ctx.lineWidth = 1.6 * scale;
            ctx.beginPath();
            ctx.moveTo(-7 * scale, -31 * scale);
            ctx.lineTo(7 * scale, -31 * scale);
            ctx.stroke();

            ctx.fillStyle = "#f7e7b5";
            ctx.beginPath();
            ctx.arc(0, -32 * scale, 3.5 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        function drawTopViewVehicle(ctx, x, y, widthPx, lengthPx, type, direction = "toward") {
            const topImages = {
                classic_rear: rasterAssets.sedanTop,
                classic_rear_purple: rasterAssets.sedanTop,
                modern_front_white: rasterAssets.suvTop,
                modern_front_red: rasterAssets.suvTop,
                convertible: rasterAssets.convertibleTop,
                truck: rasterAssets.truckTop,
                scooter: rasterAssets.scooterAngle,
                motorcycle: rasterAssets.motorcycleAngle
            };
            const topImage = topImages[type] || rasterAssets.sedanTop;
            if (isRasterReady(topImage)) {
                ctx.save();
                ctx.translate(x, y);
                if (direction === "away") ctx.rotate(Math.PI);
                const isTwoWheeler = type === "scooter" || type === "motorcycle";
                if (isTwoWheeler) {
                    const drawHeight = type === "motorcycle" ? 58 : 52;
                    const drawWidth = drawHeight * (topImage.naturalWidth / topImage.naturalHeight);
                    ctx.drawImage(topImage, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                } else {
                    const drawLength = Math.min(lengthPx * 0.88, type === "truck" ? 82 : 76);
                    const drawWidth = drawLength * (topImage.naturalWidth / topImage.naturalHeight);
                    ctx.drawImage(topImage, -drawWidth / 2, -drawLength / 2, drawWidth, drawLength);
                }
                ctx.restore();
                return;
            }

            ctx.save();
            ctx.translate(x, y);
            if (direction === "away") ctx.rotate(Math.PI);
            const w = Math.min(widthPx * 0.58, 34);
            const l = Math.min(lengthPx * 0.88, 76);

            ctx.fillStyle = "rgba(15, 23, 42, 0.11)";
            ctx.beginPath();
            ctx.roundRect(-w / 2 + 2, -l / 2 + 3, w, l, 8);
            ctx.fill();

            ctx.fillStyle = type.includes("purple") ? "#a7a5bd" : "#e9ece8";
            ctx.strokeStyle = "#3d4c5c";
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.roundRect(-w / 2, -l / 2, w, l, 7);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#435568";
            ctx.beginPath();
            ctx.roundRect(-w / 2 + 4, -l * 0.23, w - 8, l * 0.24, 3);
            ctx.fill();
            ctx.fillStyle = "#cbd5d8";
            ctx.beginPath();
            ctx.roundRect(-w / 2 + 5, l * 0.15, w - 10, l * 0.18, 3);
            ctx.fill();
            ctx.restore();
        }

        function drawArcadeBuilding(ctx, x, width, groundY, floors, side, personType, signStyle) {
            // Arcade is 4 m; each upper floor is 3.4 m.
            const arcadeHeight = 132;
            const upperFloorHeight = Math.round(arcadeHeight * (3.4 / 4));
            const totalHeight = arcadeHeight + ((floors - 1) * upperFloorHeight);
            const topY = groundY - totalHeight;
            const streetEdgeX = side === "left" ? x + width : x;
            const backEdgeX = side === "left" ? x : x + width;
            const inwardDirection = side === "left" ? -1 : 1;
            const streetDirection = -inwardDirection;
            const recessDepth = Math.min(width * 0.72, 64);
            const columnWidth = Math.max(7, Math.min(11, width * 0.12));

            ctx.save();

            ctx.fillStyle = "#b9a69a";
            ctx.strokeStyle = "#394553";
            ctx.lineWidth = 2;
            ctx.fillRect(x, topY, width, totalHeight);
            ctx.strokeRect(x, topY, width, totalHeight);

            const openingInset = 9;
            const arcadeX = side === "left" ? x + openingInset : streetEdgeX + columnWidth;
            const arcadeWidth = Math.max(12, width - columnWidth - openingInset);
            const depthGradient = ctx.createLinearGradient(backEdgeX, 0, streetEdgeX, 0);
            if (side === "left") {
                depthGradient.addColorStop(0, "#f1f5f9");
                depthGradient.addColorStop(1, "#ffffff");
            } else {
                depthGradient.addColorStop(0, "#ffffff");
                depthGradient.addColorStop(1, "#f1f5f9");
            }
            ctx.fillStyle = depthGradient;
            ctx.fillRect(arcadeX, groundY - arcadeHeight + 12, arcadeWidth, arcadeHeight - 15);
            ctx.strokeStyle = "#cbd5e1";
            ctx.lineWidth = 1;
            ctx.strokeRect(arcadeX, groundY - arcadeHeight + 12, arcadeWidth, arcadeHeight - 15);

            const columnX = side === "left" ? streetEdgeX - columnWidth : streetEdgeX;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(columnX, groundY - arcadeHeight, columnWidth, arcadeHeight);
            ctx.strokeStyle = "#64748b";
            ctx.lineWidth = 1.4;
            ctx.strokeRect(columnX, groundY - arcadeHeight, columnWidth, arcadeHeight);

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(x, groundY - arcadeHeight, width, 9);
            ctx.strokeStyle = "#64748b";
            ctx.beginPath();
            ctx.moveTo(x, groundY - arcadeHeight);
            ctx.lineTo(x + width, groundY - arcadeHeight);
            ctx.stroke();

            for (let floor = 1; floor < floors; floor++) {
                const floorBottom = groundY - arcadeHeight - ((floor - 1) * upperFloorHeight);
                const floorTop = floorBottom - upperFloorHeight;

                ctx.fillStyle = floor % 2 === 0 ? "#c4b2a7" : "#b9a69a";
                ctx.fillRect(x + 2, floorTop + 2, width - 4, upperFloorHeight - 3);

                ctx.strokeStyle = "rgba(57, 69, 83, 0.72)";
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(x, floorBottom);
                ctx.lineTo(x + width, floorBottom);
                ctx.stroke();

                const windowMargin = Math.max(7, width * 0.15);
                ctx.fillStyle = "#8ca3ad";
                ctx.strokeStyle = "#475569";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(
                    x + windowMargin,
                    floorTop + 11,
                    Math.max(10, width - (windowMargin * 2)),
                    20,
                    2
                );
                ctx.fill();
                ctx.stroke();

                ctx.strokeStyle = "rgba(255,255,255,0.65)";
                ctx.beginPath();
                ctx.moveTo(x + width / 2, floorTop + 12);
                ctx.lineTo(x + width / 2, floorTop + 30);
                ctx.stroke();
            }

            if (signStyle && signStyle !== "none") {
                const signColor = side === "left" ? "#c56a4a" : "#467c78";
                const signX = streetEdgeX + (streetDirection * 15);
                const signY = groundY - arcadeHeight - 38;
                ctx.strokeStyle = "#475569";
                ctx.lineWidth = 1.2;

                if (signStyle === "round") {
                    ctx.beginPath();
                    ctx.moveTo(streetEdgeX, signY + 15);
                    ctx.lineTo(signX - (streetDirection * 11), signY + 15);
                    ctx.stroke();
                    ctx.fillStyle = signColor;
                    ctx.beginPath();
                    ctx.arc(signX, signY + 15, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = "rgba(255,255,255,0.7)";
                    ctx.beginPath();
                    ctx.arc(signX - 3, signY + 12, 3, 0, Math.PI * 2);
                    ctx.fill();
                } else if (signStyle === "awning") {
                    const awningX = side === "left" ? streetEdgeX - 3 : streetEdgeX - 31;
                    ctx.fillStyle = signColor;
                    ctx.beginPath();
                    ctx.moveTo(awningX, groundY - arcadeHeight + 18);
                    ctx.lineTo(awningX + 34, groundY - arcadeHeight + 18);
                    ctx.lineTo(awningX + 28, groundY - arcadeHeight + 31);
                    ctx.lineTo(awningX + 6, groundY - arcadeHeight + 31);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.strokeStyle = "rgba(255,255,255,0.8)";
                    for (let stripe = 9; stripe <= 25; stripe += 8) {
                        ctx.beginPath();
                        ctx.moveTo(awningX + stripe, groundY - arcadeHeight + 19);
                        ctx.lineTo(awningX + stripe - 2, groundY - arcadeHeight + 30);
                        ctx.stroke();
                    }
                } else {
                    ctx.fillStyle = signColor;
                    ctx.beginPath();
                    ctx.roundRect(signX - 9, signY, 18, 36, 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(streetEdgeX, signY + 6);
                    ctx.lineTo(signX - (streetDirection * 9), signY + 6);
                    ctx.moveTo(streetEdgeX, signY + 30);
                    ctx.lineTo(signX - (streetDirection * 9), signY + 30);
                    ctx.stroke();
                    ctx.fillStyle = "rgba(255,255,255,0.45)";
                    ctx.fillRect(signX - 5, signY + 5, 3, 26);
                }
            }

            if (personType && personType !== "none") {
                const personX = streetEdgeX + (inwardDirection * Math.min(recessDepth * 0.48, 27));
                const people = {
                    ped1: rasterAssets.dogWalker,
                    ped2: rasterAssets.parentChild,
                    ped3: rasterAssets.cityWalker,
                    ped4: rasterAssets.jogger,
                    ped5: rasterAssets.shopper
                };
                drawRasterAtGroundFacing(
                    ctx,
                    people[personType] || rasterAssets.cityWalker,
                    personX,
                    groundY - 2,
                    68,
                    side === "right"
                );
            }

            ctx.restore();
        }

        function drawArcadePlan(ctx, x, width, topY, height, side) {
            ctx.save();
            ctx.fillStyle = "#d8d0ca";
            ctx.fillRect(x, topY, width, height);

            const arcadeDepth = Math.min(width * 0.7, 62);
            const arcadeX = side === "left" ? x + width - arcadeDepth : x;
            ctx.fillStyle = "#eee7df";
            ctx.fillRect(arcadeX, topY, arcadeDepth, height);

            ctx.strokeStyle = "#8b7c72";
            ctx.lineWidth = 1.3;
            ctx.setLineDash([8, 6]);
            const recessLineX = side === "left" ? arcadeX : arcadeX + arcadeDepth;
            ctx.beginPath();
            ctx.moveTo(recessLineX, topY);
            ctx.lineTo(recessLineX, topY + height);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = "#b9a69a";
            const columnX = side === "left" ? x + width - 8 : x;
            for (let cy = topY + 18; cy < topY + height; cy += 38) {
                ctx.fillRect(columnX, cy, 8, 9);
            }
            ctx.restore();
        }

        // Hand-drawn style cyclist (front view) for dedicated bike lanes
        function drawCyclistFront(ctx, x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            // Soft ground shadow
            ctx.fillStyle = "rgba(15, 23, 42, 0.12)";
            ctx.beginPath();
            ctx.ellipse(0, -1 * scale, 14 * scale, 3 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = "#383c44";

            // Front wheel (narrow ellipse, front view)
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            ctx.ellipse(0, -11 * scale, 3 * scale, 11 * scale, 0, 0, Math.PI * 2);
            ctx.stroke();

            // Fork + head tube up to the handlebar
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.moveTo(-2.5 * scale, -13 * scale);
            ctx.lineTo(-1 * scale, -34 * scale);
            ctx.moveTo(2.5 * scale, -13 * scale);
            ctx.lineTo(1 * scale, -34 * scale);
            ctx.moveTo(0, -34 * scale);
            ctx.lineTo(0, -38 * scale);
            ctx.stroke();

            // Handlebar
            ctx.lineWidth = 2.4;
            ctx.beginPath();
            ctx.moveTo(-13 * scale, -38 * scale);
            ctx.lineTo(13 * scale, -38 * scale);
            ctx.stroke();
            // Grips
            ctx.strokeStyle = "#1e293b";
            ctx.beginPath();
            ctx.moveTo(-13 * scale, -38 * scale); ctx.lineTo(-13 * scale, -41 * scale);
            ctx.moveTo(13 * scale, -38 * scale); ctx.lineTo(13 * scale, -41 * scale);
            ctx.stroke();

            // Pedaling legs (slightly asymmetric for life)
            ctx.strokeStyle = "#46566e";
            ctx.lineWidth = 3.2;
            ctx.beginPath();
            ctx.moveTo(-4 * scale, -40 * scale);
            ctx.lineTo(-6 * scale, -22 * scale);
            ctx.lineTo(-5 * scale, -14 * scale);
            ctx.moveTo(4 * scale, -40 * scale);
            ctx.lineTo(6.5 * scale, -24 * scale);
            ctx.lineTo(6 * scale, -18 * scale);
            ctx.stroke();

            // Rider torso (leaning slightly forward over the bars)
            ctx.fillStyle = "#6c7f9b";
            ctx.strokeStyle = "#383c44";
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            ctx.moveTo(-7 * scale, -40 * scale);
            ctx.quadraticCurveTo(-8 * scale, -56 * scale, 0, -58 * scale);
            ctx.quadraticCurveTo(8 * scale, -56 * scale, 7 * scale, -40 * scale);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Arms reaching down/out to the grips
            ctx.strokeStyle = "#6c7f9b";
            ctx.lineWidth = 2.8;
            ctx.beginPath();
            ctx.moveTo(-6 * scale, -53 * scale);
            ctx.lineTo(-12 * scale, -40 * scale);
            ctx.moveTo(6 * scale, -53 * scale);
            ctx.lineTo(12 * scale, -40 * scale);
            ctx.stroke();

            // Head + helmet
            ctx.fillStyle = "#d8a47f";
            ctx.beginPath();
            ctx.arc(0, -64 * scale, 5.5 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#383c44";
            ctx.lineWidth = 1.2;
            ctx.stroke();
            // Helmet shell
            ctx.fillStyle = "#84cc16";
            ctx.beginPath();
            ctx.arc(0, -65.5 * scale, 6.2 * scale, Math.PI * 1.05, Math.PI * 1.95);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        // White pavement bicycle marking for the plan view
        function drawBikeMarkingTop(ctx, x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.92)";
            ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
            ctx.lineWidth = 2;

            // Side-view bicycle glyph (standard pavement marking)
            ctx.beginPath();
            ctx.arc(-11, 6, 7, 0, Math.PI * 2);   // rear wheel
            ctx.moveTo(18, 6);
            ctx.arc(11, 6, 7, 0, Math.PI * 2);    // front wheel
            ctx.stroke();

            // Frame
            ctx.beginPath();
            ctx.moveTo(-11, 6);
            ctx.lineTo(-4, -4);
            ctx.lineTo(7, -4);
            ctx.lineTo(11, 6);
            ctx.lineTo(-4, 6);
            ctx.lineTo(-4, -4);
            ctx.stroke();

            // Seat + handlebar
            ctx.beginPath();
            ctx.moveTo(-4, -4); ctx.lineTo(-6, -9);
            ctx.moveTo(-8.5, -9); ctx.lineTo(-3.5, -9);
            ctx.moveTo(7, -4); ctx.lineTo(9, -10);
            ctx.moveTo(6, -10.5); ctx.lineTo(11, -10);
            ctx.stroke();

            ctx.restore();
        }

        function getCarDirection(seg) {
            return seg.carDirection || (seg.car && seg.car.includes("rear") ? "away" : "toward");
        }

        function drawLaneVehicle(ctx, seg, x, groundY) {
            const direction = getCarDirection(seg);
            // Plan view looks down the road; elevation looks across it, so front/rear is inverse.
            const elevationFacesFront = direction === "away";
            const isClassic = seg.car.includes("classic");
            const bodyColor = seg.car.includes("red")
                ? "#ef4444"
                : seg.car.includes("purple")
                    ? "#cbd2e6"
                    : "#ffffff";

            // 4-wheelers read a touch large in the section, so scale every car down uniformly.
            const carScale = 0.9;

            if (seg.car === "convertible") {
                drawRasterAtGroundFacing(ctx, rasterAssets.convertibleSide, x, groundY, 48 * carScale, elevationFacesFront);
                return;
            }
            if (seg.car === "truck") {
                drawRasterAtGround(ctx, rasterAssets.truckRear, x, groundY, 62 * carScale);
                return;
            }
